<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEAD HALLS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; user-select: none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  
  /* CRITICAL FOR RETRO AESTHETIC: FORCED PIXELATION */
  canvas { 
    display: block; 
    width: 100vw !important; 
    height: 100vh !important;
    object-fit: fill;
    image-rendering: -moz-crisp-edges;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
  }

  /* Classic Zombies Style HUD */
  #hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
    font-family: 'VT323', monospace;
    font-weight: normal; text-transform: uppercase;
    display: none;
  }
  .hud-text { position: absolute; text-shadow: 2px 2px 0 #000, 3px 3px 0 #000; }

  /* Blood Red & Gold HUD */
  #round { bottom: 20px; left: 30px; font-size: 72px; color: #a30000; }
  #roundNumber { color: #fff; text-shadow: 2px 2px 0 #a30000, 4px 4px 0 #000; }
  #points { bottom: 20px; right: 40px; font-size: 64px; color: #ffcc00; }
  #ammo { bottom: 80px; right: 40px; font-size: 48px; color: #fff; }
  #waveNotice {
    top: 30%; left: 50%; transform: translate(-50%, -50%);
    font-size: 80px; color: #a30000; text-align: center;
    opacity: 0; transition: opacity 0.5s;
    text-shadow: 4px 4px 0 #000;
  }

  /* Retro Crosshair */
  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 15; pointer-events: none; display: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
  }
  #crosshair::before { width: 14px; height: 2px; top: -1px; left: -7px; }
  #crosshair::after { width: 2px; height: 14px; top: -7px; left: -1px; }

  .menu-overlay {
    position: fixed; inset: 0;
    background: rgba(10, 5, 5, 0.95);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20; font-family: 'VT323', monospace;
    color: #fff; box-shadow: inset 0 0 150px #000;
  }
  
  h1 { font-size: 100px; color: #a30000; margin-bottom: 10px; text-shadow: 5px 5px 0 #000; text-align: center; }
  p.sub { font-size: 28px; margin-bottom: 40px; color: #aaa; text-align: center; }

  .btn {
    background: #1a0000; color: #fff; border: 4px solid #4a0000;
    padding: 15px 40px; font-size: 32px; font-family: inherit;
    cursor: pointer; margin: 10px; width: 350px;
    transition: all 0.1s; text-shadow: 2px 2px 0 #000;
  }
  .btn:hover { background: #4a0000; border-color: #ffcc00; transform: scale(1.05); color: #ffcc00; }
  .btn:active { transform: scale(0.95); }

  #pauseMenu { display: none; }
  #mainMenu { display: flex; }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-text" id="waveNotice">WAVE <span id="waveNoticeNum">1</span></div>
  <div class="hud-text" id="round">ROUND <span id="roundNumber">1</span></div>
  <div class="hud-text" id="points">500</div>
  <div class="hud-text" id="ammo"><span id="ammoCurrent">8</span> / <span id="ammoReserve" style="color:#888">32</span></div>
</div>
<div id="crosshair"></div>

<div id="mainMenu" class="menu-overlay">
  <h1>DEAD HALLS</h1>
  <p class="sub">SURVIVE THE UNDEAD<br><br>1: Hands | 2: Shotgun<br>Space: Jump | R: Reload | Esc: Pause</p>
  <button class="btn" id="startBtn">START GAME</button>
</div>

<div id="pauseMenu" class="menu-overlay">
  <h1>PAUSED</h1>
  <button class="btn" id="resumeBtn">RESUME</button>
  <button class="btn" id="leaveBtn">LEAVE MAP</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ------------------------------------------------------------------
// ENGINE & STATE - RETRO SETTINGS
// ------------------------------------------------------------------
const STATES = { MENU: 'menu', PLAYING: 'playing', PAUSED: 'paused' };
let currentGameState = STATES.MENU;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.FogExp2(0x020202, 0.06); 

const camera = new THREE.PerspectiveCamera(90, window.innerWidth/window.innerHeight, 0.01, 100); 
camera.rotation.order = 'YXZ';
camera.position.set(0, 1.6, 4);

const RES_SCALE = 0.3; // Extreme internal downscaling for chunky pixels
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(1);
renderer.outputEncoding = THREE.LinearEncoding; 
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap; 
document.body.appendChild(renderer.domElement);

function resize() {
  renderer.setSize(window.innerWidth * RES_SCALE, window.innerHeight * RES_SCALE, false);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ------------------------------------------------------------------
// TEXTURES (LOW-RES, NEAREST NEIGHBOR)
// ------------------------------------------------------------------
function makeTex(type) {
  const size = 32; 
  const c = document.createElement('canvas');
  c.width = size; c.height = size; 
  const ctx = c.getContext('2d');

  // Base colors
  if (type === 'wall') {
    ctx.fillStyle = '#444'; ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#222'; ctx.fillRect(0, 0, size, 4); ctx.fillRect(0, size-4, size, 4);
  } else if (type === 'floor') {
    ctx.fillStyle = '#222'; ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#111'; ctx.fillRect(0,0,16,16); ctx.fillRect(16,16,16,16);
  } else if (type === 'dirt') {
    ctx.fillStyle = '#2a1f1a'; ctx.fillRect(0,0,size,size);
  } else if (type === 'wood') {
    ctx.fillStyle = '#3e2723'; ctx.fillRect(0,0,size,size);
  } else if (type === 'zFace') {
    ctx.fillStyle = '#7a8075'; ctx.fillRect(0,0,size,size); 
    // Red glowing eyes
    ctx.fillStyle = '#ff0000'; ctx.fillRect(8, 12, 4, 4); ctx.fillRect(20, 12, 4, 4);
    // Bloody gaping mouth
    ctx.fillStyle = '#220000'; ctx.fillRect(10, 20, 12, 8);
  } else if (type === 'zUniform') {
    // Tattered grey uniform
    ctx.fillStyle = '#3b423f'; ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#212624'; ctx.fillRect(0, 0, size, 6); 
    // Blood stains
    ctx.fillStyle = '#4a0000'; ctx.fillRect(4, 14, 8, 10);
  } else if (type === 'zFlesh') {
    ctx.fillStyle = '#7a8075'; ctx.fillRect(0,0,size,size);
  } else if (type === 'gunMetal') {
    ctx.fillStyle = '#333'; ctx.fillRect(0,0,size,size);
  } else if (type === 'skin') {
    ctx.fillStyle = '#c5a085'; ctx.fillRect(0,0,size,size);
  }

  // Draw chunky noise
  for (let i = 0; i < 300; i++) {
    const x = Math.floor(Math.random() * (size/2)) * 2;
    const y = Math.floor(Math.random() * (size/2)) * 2;
    const r = Math.random();
    if (r > 0.5) ctx.fillStyle = 'rgba(0,0,0,0.3)';
    else if (r > 0.2) ctx.fillStyle = 'rgba(255,255,255,0.1)';
    else if (type === 'wall' || type === 'floor') ctx.fillStyle = 'rgba(80, 10, 10, 0.4)';
    else ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x, y, 2, 2); 
  }

  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = tex.minFilter = THREE.NearestFilter; 
  tex.generateMipmaps = false; 
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

const matWall = new THREE.MeshLambertMaterial({ map: makeTex('wall') });
const matFloor  = new THREE.MeshLambertMaterial({ map: makeTex('floor') });
const matDirt  = new THREE.MeshLambertMaterial({ map: makeTex('dirt') });
const matSkin = new THREE.MeshLambertMaterial({ map: makeTex('skin') }); 
const matGunMetal = new THREE.MeshLambertMaterial({ map: makeTex('gunMetal') });
const matGunWood = new THREE.MeshLambertMaterial({ map: makeTex('wood') });

// Zombie Mats
const matZFace = new THREE.MeshLambertMaterial({ map: makeTex('zFace') });
const matZUniform = new THREE.MeshLambertMaterial({ map: makeTex('zUniform') });
const matZFlesh = new THREE.MeshLambertMaterial({ map: makeTex('zFlesh') });

// ------------------------------------------------------------------
// MAP GEN
// ------------------------------------------------------------------
const colliders = [];
const spawnPoints = [
  new THREE.Vector3(0, 0, 16),
  new THREE.Vector3(-4, 0, 26),
  new THREE.Vector3(4, 0, 28),
  new THREE.Vector3(0, 0, 40),
  new THREE.Vector3(-7, 0, 43),
  new THREE.Vector3(7, 0, 43)
];

function addWall(x, z, w, d) {
  const geo = new THREE.BoxGeometry(w, 4, d);
  const uvs = geo.attributes.uv;
  for (let i = 0; i < uvs.count; i++) { uvs.setX(i, uvs.getX(i)*(w>d?w/4:d/4)); uvs.setY(i, uvs.getY(i)); }
  const m = new THREE.Mesh(geo, matWall);
  m.position.set(x, 2, z); 
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
  colliders.push({ minX: x-w/2, maxX: x+w/2, minZ: z-d/2, maxZ: z+d/2 });
}

function addFloor(x, z, w, d, mat, hasCeiling = true) {
  const f = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d), mat);
  f.position.set(x, -0.1, z); 
  f.receiveShadow = true;
  scene.add(f);
  if (hasCeiling) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d), matWall);
    c.position.set(x, 4.1, z); 
    c.receiveShadow = true;
    scene.add(c);
  }
}

addFloor(0, 4, 10, 10, matFloor); addWall(0, -1.5, 10, 1);
addWall(-5.5, 4, 1, 12); addWall(5.5, 4, 1, 12); addWall(-3.5, 9.5, 5, 1); addWall(3.5, 9.5, 5, 1);
addFloor(0, 15, 4, 10, matFloor); addWall(-2.5, 15, 1, 10); addWall(2.5, 15, 1, 10);
addFloor(0, 25, 12, 10, matFloor); addWall(-4.5, 19.5, 5, 1); addWall(4.5, 19.5, 5, 1); 
addWall(-6.5, 25, 1, 12); addWall(6.5, 25, 1, 12); addWall(-4, 30.5, 6, 1); addWall(4, 30.5, 6, 1);
addFloor(0, 41, 20, 20, matDirt, false); addWall(-10.5, 41, 1, 22); addWall(10.5, 41, 1, 22); 
addWall(0, 51.5, 22, 1); addWall(-7.5, 30.5, 5, 1); addWall(7.5, 30.5, 5, 1);

// Lighting
scene.add(new THREE.AmbientLight(0x222222));
function addPointLight(color, intensity, dist, x, y, z, castShadow) {
  const pl = new THREE.PointLight(color, intensity, dist);
  pl.position.set(x, y, z);
  if (castShadow) {
    pl.castShadow = true; 
    pl.shadow.mapSize.width = 128; pl.shadow.mapSize.height = 128; 
    pl.shadow.bias = -0.005;
  }
  scene.add(pl);
}
addPointLight(0xffa555, 1.5, 12, 0, 3, 4, true); 
addPointLight(0xff2211, 1.2, 10, 0, 3, 15, false); // Red alarm light
addPointLight(0xffa555, 1.5, 14, 0, 3, 25, true); 
addPointLight(0x5588ff, 1.8, 25, 0, 7, 40, true); // Moonlight outside

// ------------------------------------------------------------------
// VIEWMODELS (BLOCKY LOW-POLY FPS ARMS/GUN)
// ------------------------------------------------------------------
const viewmodel = new THREE.Group();
const vmShotgun = new THREE.Group();
const vmHands = new THREE.Group();

// Classic Blocky Shotgun
const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 1.0), matGunMetal);
barrel.position.set(0.25, -0.22, -0.6); vmShotgun.add(barrel);

const magTube = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.03, 0.8), matGunMetal);
magTube.position.set(0.25, -0.26, -0.5); vmShotgun.add(magTube);

const pump = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.35), matGunWood);
pump.position.set(0.25, -0.26, -0.5); vmShotgun.add(pump);

const reciever = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.1, 0.25), matGunMetal);
reciever.position.set(0.25, -0.24, -0.1); vmShotgun.add(reciever);

const stock = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.14, 0.35), matGunWood);
stock.position.set(0.25, -0.28, 0.15); stock.rotation.x = -0.15; vmShotgun.add(stock);

// Muzzle Flash Sprite
const flash = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.6), new THREE.MeshBasicMaterial({ color: 0xffdd00, transparent: true, side: THREE.DoubleSide }));
flash.position.set(0.25, -0.22, -1.2); flash.visible = false; vmShotgun.add(flash);

// Blocky Fists
const hLeft = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.35), matSkin);
hLeft.position.set(-0.35, -0.25, -0.4); vmHands.add(hLeft);
const hRight = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.35), matSkin);
hRight.position.set(0.35, -0.25, -0.4); vmHands.add(hRight);

viewmodel.add(vmShotgun);
viewmodel.add(vmHands);
camera.add(viewmodel);
scene.add(camera);

// ------------------------------------------------------------------
// PROCEDURAL LOW POLY ZOMBIES 
// ------------------------------------------------------------------
const zombies = [];
let targets = [];

function makeBone(w, h, d, mat, shiftY) {
  const geo = new THREE.BoxGeometry(w, h, d);
  geo.translate(0, shiftY, 0); 
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

function spawnZombie(x, z, spdMult) {
  const zGroup = new THREE.Group();
  zGroup.position.set(x, 0, z);

  const mFace = matZFace.clone();
  const mUniform = matZUniform.clone();
  const mFlesh = matZFlesh.clone();

  // Torso
  const torso = makeBone(0.5, 0.7, 0.3, mUniform, 0);
  torso.position.y = 1.0;
  
  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), mFace);
  head.position.y = 0.55; 
  head.castShadow = true; 
  torso.add(head);

  // Arms 
  const aL = makeBone(0.15, 0.7, 0.15, mUniform, -0.35);
  aL.position.set(-0.35, 0.25, 0); 
  torso.add(aL);
  
  const aR = makeBone(0.15, 0.7, 0.15, mUniform, -0.35);
  aR.position.set(0.35, 0.25, 0); 
  torso.add(aR);

  // Legs 
  const lL = makeBone(0.18, 0.8, 0.18, mUniform, -0.4);
  lL.position.set(-0.15, 0.8, 0); 
  zGroup.add(lL);
  
  const lR = makeBone(0.18, 0.8, 0.18, mUniform, -0.4);
  lR.position.set(0.15, 0.8, 0); 
  zGroup.add(lR);

  zGroup.add(torso);
  scene.add(zGroup);

  const parts = [torso, head, aL, aR, lL, lR];
  const data = { mesh: zGroup, parts: parts, hp: 150, isDead: false, speed: 2.2 * spdMult, animTime: Math.random() * 10 };
  zombies.push(data);

  parts.forEach(p => { 
    p.userData.zData = data; 
    targets.push(p); 
  });
}

// ------------------------------------------------------------------
// WAVE SYSTEM
// ------------------------------------------------------------------
let currentRound = 1;
let zombiesAlive = 0;

function startWave() {
  document.getElementById('roundNumber').innerText = currentRound;
  
  const notice = document.getElementById('waveNotice');
  document.getElementById('waveNoticeNum').innerText = currentRound;
  notice.style.opacity = 1;
  setTimeout(() => notice.style.opacity = 0, 3000);

  const toSpawn = 4 + (currentRound * 2);
  zombiesAlive = toSpawn;

  for (let i=0; i<toSpawn; i++) {
    const pt = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
    const ox = (Math.random()-0.5)*2; const oz = (Math.random()-0.5)*2;
    spawnZombie(pt.x + ox, pt.z + oz, 1 + (currentRound * 0.1));
  }
}

// ------------------------------------------------------------------
// INPUT & MOVEMENT
// ------------------------------------------------------------------
let yaw = 0, pitch = 0;
const keys = {};

document.getElementById('startBtn').addEventListener('click', () => document.body.requestPointerLock());
document.getElementById('resumeBtn').addEventListener('click', () => document.body.requestPointerLock());

document.getElementById('leaveBtn').addEventListener('click', () => {
  currentGameState = STATES.MENU;
  document.getElementById('pauseMenu').style.display = 'none';
  document.getElementById('mainMenu').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('crosshair').style.display = 'none';
  
  zombies.forEach(z => scene.remove(z.mesh));
  zombies.length = 0; targets.length = 0;
  currentRound = 1; zombiesAlive = 0;
  pts = 500; ammoCur = 8; ammoRes = 32;
  
  document.getElementById('points').innerText = pts;
  document.getElementById('ammoCurrent').innerText = ammoCur;
  document.getElementById('ammoReserve').innerText = ammoRes;
  
  camera.position.set(0, 1.6, 4); yaw = 0; pitch = 0;
});

document.addEventListener('pointerlockchange', () => {
  const isLocked = document.pointerLockElement === document.body;
  if (isLocked) {
    currentGameState = STATES.PLAYING;
    document.getElementById('mainMenu').style.display = 'none'; document.getElementById('pauseMenu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    
    if (equipped === 1) document.getElementById('crosshair').style.display = 'block';
    if (zombiesAlive === 0 && currentRound === 1 && zombies.length === 0) startWave();
    
  } else if (currentGameState === STATES.PLAYING) {
    currentGameState = STATES.PAUSED;
    document.getElementById('pauseMenu').style.display = 'flex'; document.getElementById('crosshair').style.display = 'none';
  }
});

document.addEventListener('keydown', e => { 
  if (currentGameState === STATES.PLAYING) {
    keys[e.code] = true; 
    if (e.code === 'Space' && isGrounded) jump();
    if (e.code === 'KeyR' && equipped === 1) initiateReload();
    if (e.code === 'Digit1') switchWeapon(0);
    if (e.code === 'Digit2') switchWeapon(1);
  }
});
document.addEventListener('keyup', e => keys[e.code] = false);

document.addEventListener('mousemove', e => {
  if (currentGameState !== STATES.PLAYING) return;
  yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
});

// ------------------------------------------------------------------
// COMBAT & HIT DETECTION
// ------------------------------------------------------------------
let ammoCur = 8, ammoRes = 32, pts = 500;
let isReloading = false; let equipped = 1; 
const raycaster = new THREE.Raycaster();

function switchWeapon(id) {
  if (isReloading) return;
  equipped = id; vmHands.visible = (id === 0); vmShotgun.visible = (id === 1);
  document.getElementById('ammo').style.display = id === 1 ? 'block' : 'none';
  if (currentGameState === STATES.PLAYING) document.getElementById('crosshair').style.display = id === 1 ? 'block' : 'none';
}
switchWeapon(equipped);

function initiateReload() {
  if (isReloading || ammoCur === 8 || ammoRes === 0) return;
  isReloading = true;
  pump.position.z -= 0.1; setTimeout(() => pump.position.z += 0.1, 300);
  setTimeout(() => {
    const need = 8 - ammoCur; const pull = Math.min(need, ammoRes);
    ammoCur += pull; ammoRes -= pull;
    document.getElementById('ammoCurrent').innerText = ammoCur;
    document.getElementById('ammoReserve').innerText = ammoRes;
    isReloading = false;
  }, 1000);
}

document.body.addEventListener('mousedown', e => {
  if (currentGameState !== STATES.PLAYING || e.button !== 0) return;
  
  if (equipped === 0) { // Punch
    hRight.position.z -= 0.3; hRight.rotation.y = 0.5;
    setTimeout(() => { hRight.position.z += 0.3; hRight.rotation.y = 0; }, 150);
    return;
  }

  if (isReloading || ammoCur <= 0) { if (ammoCur === 0) initiateReload(); return; }
  ammoCur--; document.getElementById('ammoCurrent').innerText = ammoCur;
  
  // Recoil
  pitch += 0.08; viewmodel.position.z += 0.2; pump.position.z -= 0.15; 
  setTimeout(() => { viewmodel.position.z -= 0.2; pump.position.z += 0.15; }, 150);

  // Muzzle Flash
  flash.visible = true; flash.rotation.z = Math.random() * Math.PI;
  setTimeout(() => flash.visible = false, 50);

  raycaster.setFromCamera({ x: 0, y: 0 }, camera);
  const hits = raycaster.intersectObjects(targets);
  if (hits.length > 0) {
    const zData = hits[0].object.userData.zData;
    if (zData && !zData.isDead) {
      zData.hp -= 100; pts += 10; document.getElementById('points').innerText = pts;
      
      // Hitmarker Red Flash
      zData.parts.forEach(p => { p.material.color.setHex(0xff0000); });
      setTimeout(() => {
        if (!zData.isDead) zData.parts.forEach(p => { p.material.color.setHex(0xffffff); });
      }, 100);

      zData.mesh.translateZ(-0.4); // Knockback

      if (zData.hp <= 0) {
        zData.isDead = true; pts += 60; document.getElementById('points').innerText = pts;
        zData.parts.forEach(p => { p.material.color.setHex(0x330000); }); 
        zombiesAlive--;
        if (zombiesAlive <= 0) { currentRound++; setTimeout(startWave, 3500); }
      }
    }
  }
});

// ------------------------------------------------------------------
// PHYSICS & MAIN LOOP
// ------------------------------------------------------------------
let velY = 0; const grav = 18; let isGrounded = true;
function jump() { velY = 7.5; isGrounded = false; }

function checkCol(nx, nz) {
  for (let c of colliders) if (nx+0.3 > c.minX && nx-0.3 < c.maxX && nz+0.3 > c.minZ && nz-0.3 < c.maxZ) return true;
  return false;
}

const clock = new THREE.Clock(); let sway = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  if (currentGameState === STATES.PLAYING) {
    camera.rotation.set(pitch, yaw, 0, 'YXZ');

    const speed = (keys['ShiftLeft'] ? 8.0 : 5.0) * dt;
    const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const rgt = new THREE.Vector3(-fwd.z, 0, fwd.x);
    let mx = 0, mz = 0;
    if (keys['KeyW']) { mx+=fwd.x; mz+=fwd.z; }
    if (keys['KeyS']) { mx-=fwd.x; mz-=fwd.z; }
    if (keys['KeyD']) { mx+=rgt.x; mz+=rgt.z; }
    if (keys['KeyA']) { mx-=rgt.x; mz-=rgt.z; }

    const len = Math.sqrt(mx*mx + mz*mz);
    if (len > 0) { mx=(mx/len)*speed; mz=(mz/len)*speed; }
    if (!checkCol(camera.position.x + mx, camera.position.z)) camera.position.x += mx;
    if (!checkCol(camera.position.x, camera.position.z + mz)) camera.position.z += mz;

    if (!isGrounded) {
      velY -= grav * dt;
      camera.position.y += velY * dt;
      if (camera.position.y <= 1.6) { camera.position.y = 1.6; velY = 0; isGrounded = true; }
    }

    sway += dt; const bob = performance.now() * 0.012;
    const isMoving = len > 0;

    if (equipped === 1) { 
      viewmodel.position.x = THREE.MathUtils.lerp(viewmodel.position.x, 0, 0.1);
      viewmodel.position.y = THREE.MathUtils.lerp(viewmodel.position.y, 0, 0.1);
      viewmodel.position.z = THREE.MathUtils.lerp(viewmodel.position.z, 0, 0.1);
      if (isReloading) viewmodel.position.y -= 0.15;
      viewmodel.position.x += Math.sin(sway*1.5)*0.002;
      if (isMoving && isGrounded) { viewmodel.position.y += Math.sin(bob*1.5) * 0.015; viewmodel.position.x += Math.cos(bob*0.75) * 0.015; }
    } else { 
      if (isMoving && isGrounded) {
        hLeft.position.y = -0.25 + Math.sin(bob*1.5) * 0.05; hRight.position.y = -0.25 + Math.sin(bob*1.5 + Math.PI) * 0.05;
      } else { hLeft.position.y = hRight.position.y = -0.25; }
    }

    for (let i = zombies.length - 1; i >= 0; i--) {
      const z = zombies[i];
      const mesh = z.mesh;
      
      if (z.isDead) {
        if (mesh.rotation.x > -Math.PI/2) mesh.rotation.x -= dt * 5; 
        mesh.position.y -= dt * 1.5; 
        
        if (mesh.position.y < -1.5) {
            scene.remove(mesh);
            targets = targets.filter(t => t.userData.zData !== z);
            zombies.splice(i, 1);
        }
        continue;
      }
      
      const dx = camera.position.x - mesh.position.x; const dz = camera.position.z - mesh.position.z;
      const dist = Math.sqrt(dx*dx + dz*dz);

      if (dist > 1.2) {
        mesh.lookAt(camera.position.x, 0, camera.position.z);
        const sx = (dx/dist) * z.speed * dt; const sz = (dz/dist) * z.speed * dt;
        if (!checkCol(mesh.position.x + sx, mesh.position.z)) mesh.position.x += sx;
        if (!checkCol(mesh.position.x, mesh.position.z + sz)) mesh.position.z += sz;

        z.animTime += dt * (12 * (z.speed/2.2)); 
        const [torso, head, aL, aR, lL, lR] = z.parts;
        
        lL.rotation.x = Math.sin(z.animTime) * 1.0; 
        lR.rotation.x = Math.sin(z.animTime + Math.PI) * 1.0;
        
        aL.rotation.x = -Math.PI/2 + 0.2 + Math.sin(z.animTime*0.5)*0.1; 
        aR.rotation.x = -Math.PI/2 + 0.2 + Math.sin(z.animTime*0.5 + Math.PI)*0.1;
        
        torso.position.y = 1.0 + Math.abs(Math.sin(z.animTime)) * 0.15; 
        torso.rotation.z = Math.sin(z.animTime*0.5) * 0.1;
      }
    }
  }
  renderer.render(scene, camera);
}
animate();
</script>
