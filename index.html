];

"audio/game-4.mp3",
"audio/game-5.mp3"
];
var bgMusic = new Audio();
var musicVolume = 70;
bgMusic.volume = musicVolume / 100;
var activeMusicPlaylist = null;
var lastMusicTrack = null;
function playRandomTrack(list) {
if (!list || !list.length) return;
var idx = Math.floor(Math.random() * list.length);
if (list.length > 1) { while (list[idx] === lastMusicTrack) idx = Math.floor(Math.random() * list.length); }
lastMusicTrack = list[idx];
bgMusic.src = list[idx];
bgMusic.play().catch(function(){});
}
function setMusicPlaylist(list) {
if (activeMusicPlaylist === list) return;
activeMusicPlaylist = list;
playRandomTrack(list);
}
bgMusic.addEventListener('ended', function() { playRandomTrack(activeMusicPlaylist); });
function startMenuMusicOnce() {
setMusicPlaylist(MUSIC_MENU);
document.removeEventListener('pointerdown', startMenuMusicOnce);
document.removeEventListener('keydown', startMenuMusicOnce);
}
document.addEventListener('pointerdown', startMenuMusicOnce);
document.addEventListener('keydown', startMenuMusicOnce);
</script>

<script>
let actx = null;
function ensureAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
const SHOT_PROFILES = {
pistol: { len: 0.2, lp: 7000, lpEnd: 0.25, gain: 0.45, oscF: 190, oscGain: 0.3 },
shotgun: { len: 0.4, lp: 3500, lpEnd: 0.35, gain: 1.0, oscF: 120, oscGain: 0.7 },
ar: { len: 0.4, lp: 5500, lpEnd: 0.25, gain: 0.75, oscF: 150, oscGain: 0.7 },
smg: { len: 0.28, lp: 6200, lpEnd: 0.18, gain: 0.55, oscF: 210, oscGain: 0.45 },
lmg: { len: 0.45, lp: 4600, lpEnd: 0.3, gain: 0.9, oscF: 110, oscGain: 0.75 },
magnum: { len: 0.42, lp: 3200, lpEnd: 0.32, gain: 1.05, oscF: 95, oscGain: 0.85 }
};
function playShot(type = "shotgun") {
ensureAudio();
const t = actx.currentTime;
const prof = SHOT_PROFILES[type] || SHOT_PROFILES.ar;
const noise = actx.createBufferSource();
const buf = actx.createBuffer(1, actx.sampleRate * prof.len, actx.sampleRate);
const d = buf.getChannelData(0);
for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 4);
noise.buffer = buf;
const filt = actx.createBiquadFilter();
filt.type = 'lowpass';
filt.frequency.setValueAtTime(prof.lp, t);
filt.frequency.exponentialRampToValueAtTime(100, t + prof.lpEnd);
const gain = actx.createGain();
gain.gain.setValueAtTime(prof.gain, t);
gain.gain.exponentialRampToValueAtTime(0.01, t + prof.lpEnd);
noise.connect(filt); filt.connect(gain); gain.connect(actx.destination);
noise.start(t);
const osc = actx.createOscillator(); osc.type = 'sine';
osc.frequency.setValueAtTime(prof.oscF, t);
osc.frequency.exponentialRampToValueAtTime(30, t+0.09);
const oscGain = actx.createGain(); oscGain.gain.setValueAtTime(prof.oscGain, t);
oscGain.gain.exponentialRampToValueAtTime(0.01, t+0.09);
osc.connect(oscGain); oscGain.connect(actx.destination);
osc.start(t); osc.stop(t+0.12);
const crackLen = 0.045;
const crackBuf = actx.createBuffer(1, actx.sampleRate * crackLen, actx.sampleRate);
const cd = crackBuf.getChannelData(0);
for (let i = 0; i < cd.length; i++) cd[i] = (Math.random()*2-1) * Math.pow(1 - i/cd.length, 8);
const crack = actx.createBufferSource(); crack.buffer = crackBuf;
const crackFilt = actx.createBiquadFilter();
crackFilt.type = 'highpass'; crackFilt.frequency.value = 2200 + Math.random()*600;
const crackGain = actx.createGain();
crackGain.gain.setValueAtTime(prof.gain * 0.9, t);
crackGain.gain.exponentialRampToValueAtTime(0.01, t + crackLen);
crack.connect(crackFilt); crackFilt.connect(crackGain); crackGain.connect(actx.destination);
crack.start(t);
}
function playReload(id) {
ensureAudio(); const t = actx.currentTime;
const clackFreqs = { 1: [900, 600], 2: [500, 350, 700], 3: [700, 500], 4: [800, 550], 5: [450, 320, 600], 6: [650, 420] }[id] || [700, 500];
clackFreqs.forEach((f, i) => {
const start = t + i * 0.09;
const osc = actx.createOscillator(); osc.type = 'square'; osc.frequency.value = f;
const gain = actx.createGain(); gain.gain.setValueAtTime(0.18, start);
gain.gain.exponentialRampToValueAtTime(0.001, start + 0.05);
osc.connect(gain); gain.connect(actx.destination); osc.start(start); osc.stop(start + 0.06);
});
}
let lastFootstep = 0;
function playFootstep() {
ensureAudio(); const t = actx.currentTime;
const buf = actx.createBuffer(1, actx.sampleRate * 0.08, actx.sampleRate);
const d = buf.getChannelData(0);
for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 3);
const src = actx.createBufferSource(); src.buffer = buf;
const filt = actx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 350 + Math.random()*150;
const gain = actx.createGain(); gain.gain.setValueAtTime(0.12, t);
gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
src.connect(filt); filt.connect(gain); gain.connect(actx.destination); src.start(t);
}
function playThud(freq) {
ensureAudio();
const t = actx.currentTime;
const osc = actx.createOscillator();
osc.type = 'sine';
osc.frequency.setValueAtTime(freq, t);
osc.frequency.exponentialRampToValueAtTime(freq*0.2, t+0.1);
const gain = actx.createGain();
gain.gain.setValueAtTime(0.6, t);
gain.gain.exponentialRampToValueAtTime(0.01, t+0.1);
osc.connect(gain); gain.connect(actx.destination);
osc.start(t); osc.stop(t+0.12);
}
function playGrowl(isHeavy = false) {
ensureAudio();
const t = actx.currentTime;
const noise = actx.createBufferSource();
const buf = actx.createBuffer(1, actx.sampleRate * 0.9, actx.sampleRate);
const d = buf.getChannelData(0);
for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
noise.buffer = buf;
const filt = actx.createBiquadFilter();
filt.type = 'bandpass';
const growlBase = (isHeavy ? 130 : 330) * (0.85 + Math.random() * 0.3);
filt.frequency.setValueAtTime(growlBase, t);
filt.Q.value = 1.1 + Math.random() * 0.4;
const gain = actx.createGain();
gain.gain.setValueAtTime(0.8, t);
gain.gain.linearRampToValueAtTime(0.0, t+0.8);
noise.connect(filt); filt.connect(gain); gain.connect(actx.destination);
noise.start(t);
}
function playDamage() { playThud(100); }
function playChime() {
ensureAudio(); const t = actx.currentTime;
[520, 780, 1040].forEach((f, i) => {
const osc = actx.createOscillator(); osc.type = 'sine'; osc.frequency.value = f;
const gain = actx.createGain(); gain.gain.setValueAtTime(0.3, t+i*0.08);
gain.gain.exponentialRampToValueAtTime(0.001, t+i*0.08+0.4);
osc.connect(gain); gain.connect(actx.destination); osc.start(t+i*0.08); osc.stop(t+i*0.08+0.5);
});
}
const STATES = { MENU: 'menu', PLAYING: 'playing', PAUSED: 'paused', DEAD: 'dead' };
let currentGameState = STATES.MENU;

const camera = new THREE.PerspectiveCamera(90, window.innerWidth/window.innerHeight, 0.01, 100);
camera.rotation.order = 'YXZ'; camera.position.set(0, 1.6, 4);
let RES_SCALE = 0.3;
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(1); renderer.outputEncoding = THREE.LinearEncoding;
