<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEAD HALLS: PORTABLE</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select: none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  
  /* Forces the canvas to upscale with crisp, chunky pixels */
  canvas { 
    display: block; 
    width: 100vw !important; 
    height: 100vh !important;
    object-fit: fill;
    image-rendering: -moz-crisp-edges;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
  }

  /* Retro NZP/Zombies style HUD */
  #hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold; text-transform: uppercase;
  }

  .hud-text {
    position: absolute;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
  }

  #round { bottom: 25px; left: 30px; font-size: 54px; color: #d00; }
  #points { bottom: 25px; right: 30px; font-size: 36px; color: #ffca28; }
  #ammo { bottom: 70px; right: 30px; font-size: 28px; color: #fff; }

  #crosshair {
    position:fixed; top:50%; left:50%; width: 4px; height: 4px;
    background: rgba(255,255,255,0.7);
    transform:translate(-50%,-50%); z-index:15; pointer-events:none;
  }

  #lookTip {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    color:#fff; font-size:16px; background:rgba(0,0,0,0.8);
    padding:10px 16px; z-index:15;
    font-family: 'Courier New', Courier, monospace;
    border: 2px solid #444; text-align: center;
  }
  #lookTip.hide { display: none; }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-text" id="round">|||</div>
  <div class="hud-text" id="points">500</div>
  <div class="hud-text" id="ammo"><span id="ammoCurrent">8</span> / <span style="color:#aaa">32</span></div>
</div>

<div id="lookTip">CLICK TO LOCK MOUSE<br><br>WASD to Move &nbsp;&middot;&nbsp; Click to Shoot</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ------------------------------------------------------------------
// CORE ENGINE SETUP
// ------------------------------------------------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0c);
scene.fog = new THREE.Fog(0x0a0a0c, 3, 30); // Gives that classic PS1/N64 draw distance fade

const camera = new THREE.PerspectiveCamera(85, window.innerWidth/window.innerHeight, 0.1, 100);
camera.rotation.order = 'YXZ';
camera.position.set(0, 1.6, 2);

// Render at 50% resolution, then let CSS scale it up (pixelated)
const RES_SCALE = 0.5; 
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(1);
// Basic linear encoding, no tone mapping, for raw retro colors
renderer.outputEncoding = THREE.LinearEncoding; 

document.body.appendChild(renderer.domElement);

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  // Set internal canvas size lower, CSS stretches it to 100vw/100vh
  renderer.setSize(w * RES_SCALE, h * RES_SCALE, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ------------------------------------------------------------------
// RETRO TEXTURE GENERATOR
// ------------------------------------------------------------------
function createRetroTexture(type) {
  const canvas = document.createElement('canvas');
  const size = 64; 
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  if (type === 'brick') {
    ctx.fillStyle = '#4a4036'; ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#302820'; // Mortar
    ctx.fillRect(0, 30, size, 4);
    ctx.fillRect(30, 0, 4, 30);
    ctx.fillRect(60, 34, 4, 30);
  } else if (type === 'tile') {
    ctx.fillStyle = '#222'; ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#111'; // Grout
    ctx.fillRect(0, 0, size, 2);
    ctx.fillRect(0, 0, 2, size);
    ctx.fillStyle = '#333'; // Highlight
    ctx.fillRect(2, 2, size-4, 2);
  } else if (type === 'dirt') {
    ctx.fillStyle = '#1a2215'; ctx.fillRect(0,0,size,size);
  } else if (type === 'wood') {
    ctx.fillStyle = '#3d2616'; ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#26160b';
    ctx.fillRect(0, 15, size, 2);
    ctx.fillRect(0, 40, size, 3);
  }

  // Add chunky noise to all textures
  for (let i = 0; i < 300; i++) {
    ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.1)';
    const px = Math.floor(Math.random() * (size/2)) * 2;
    const py = Math.floor(Math.random() * (size/2)) * 2;
    ctx.fillRect(px, py, 2, 2);
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.magFilter = THREE.NearestFilter; // The most important line for retro graphics
  tex.minFilter = THREE.NearestFilter;
  tex.generateMipmaps = false;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

const matBrick = new THREE.MeshLambertMaterial({ map: createRetroTexture('brick') });
const matTile  = new THREE.MeshLambertMaterial({ map: createRetroTexture('tile') });
const matDirt  = new THREE.MeshLambertMaterial({ map: createRetroTexture('dirt') });
const matWood  = new THREE.MeshLambertMaterial({ map: createRetroTexture('wood') });

// ------------------------------------------------------------------
// MAP BUILDER & COLLISION SYSTEM
// ------------------------------------------------------------------
const colliders = [];

function addWall(x, z, w, d, mat) {
  const h = 4;
  const geo = new THREE.BoxGeometry(w, h, d);
  
  // Adjust UVs so textures don't stretch horribly on long walls
  const uvs = geo.attributes.uv;
  for (let i = 0; i < uvs.count; i++) {
    uvs.setX(i, uvs.getX(i) * (w > d ? w/4 : d/4));
    uvs.setY(i, uvs.getY(i) * (h/4));
  }

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h/2, z);
  scene.add(mesh);

  // Add to physics colliders
  colliders.push({ minX: x - w/2, maxX: x + w/2, minZ: z - d/2, maxZ: z + d/2 });
}

function addFloor(x, z, w, d, mat, hasCeiling = true) {
  const fGeo = new THREE.BoxGeometry(w, 0.2, d);
  const uvs = fGeo.attributes.uv;
  for (let i = 0; i < uvs.count; i++) { uvs.setX(i, uvs.getX(i) * w/4); uvs.setY(i, uvs.getY(i) * d/4); }
  const floor = new THREE.Mesh(fGeo, mat);
  floor.position.set(x, -0.1, z);
  scene.add(floor);

  if (hasCeiling) {
    const cGeo = fGeo.clone();
    const ceil = new THREE.Mesh(cGeo, matBrick);
    ceil.position.set(x, 4.1, z);
    scene.add(ceil);
  }
}

// === LAYOUT ===
// Room 1 (Spawn)
addFloor(0, 4, 10, 10, matTile);
addWall(0, -1, 10, 2, matBrick);   // Back
addWall(-6, 4, 2, 12, matBrick);   // Left
addWall(6, 4, 2, 12, matBrick);    // Right
addWall(-3.5, 10, 5, 2, matBrick); // Front Left
addWall(3.5, 10, 5, 2, matBrick);  // Front Right

// Hallway
addFloor(0, 15, 4, 10, matTile);
addWall(-2.5, 15, 1, 10, matBrick);
addWall(2.5, 15, 1, 10, matBrick);

// Room 2
addFloor(0, 25, 12, 10, matTile);
addWall(-4.5, 19.5, 5, 1, matBrick); // Back left connect
addWall(4.5, 19.5, 5, 1, matBrick);  // Back right connect
addWall(-6.5, 25, 1, 12, matBrick);  // Left
addWall(6.5, 25, 1, 12, matBrick);   // Right
addWall(-4, 30.5, 6, 1, matBrick);   // Front Left
addWall(4, 30.5, 6, 1, matBrick);    // Front Right

// Courtyard (Outside)
addFloor(0, 41, 20, 20, matDirt, false);
addWall(-10.5, 41, 1, 22, matBrick);
addWall(10.5, 41, 1, 22, matBrick);
addWall(0, 51.5, 22, 1, matBrick);
addWall(-7.5, 30.5, 5, 1, matBrick); // Connect left
addWall(7.5, 30.5, 5, 1, matBrick);  // Connect right

// The Door (Kicked open)
const door = new THREE.Mesh(new THREE.BoxGeometry(2.8, 3.8, 0.2), matWood);
door.position.set(-1.2, 1.9, 31.2);
door.rotation.y = Math.PI * 0.3;
scene.add(door);
colliders.push({ minX: -2.6, maxX: -1.0, minZ: 30.8, maxZ: 32.5 }); // rough door collision

// ------------------------------------------------------------------
// ZOMBIES (Simple AI)
// ------------------------------------------------------------------
const zombies = [];
const matZSkin = new THREE.MeshLambertMaterial({ color: 0x6e705b });
const matZClothes = new THREE.MeshLambertMaterial({ color: 0x3d3532 });

function spawnZombie(x, z) {
  const zGrp = new THREE.Group();
  
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), matZClothes);
  body.position.y = 0.6; zGrp.add(body);
  
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), matZSkin);
  head.position.y = 1.4; zGrp.add(head);
  
  const arms = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.25, 0.25), matZClothes);
  arms.position.set(0, 1.0, 0.3); zGrp.add(arms);

  zGrp.position.set(x, 0, z);
  scene.add(zGrp);
  zombies.push(zGrp);
}

spawnZombie(0, 16);    // Hallway
spawnZombie(-3, 26);   // Room 2
spawnZombie(4, 27);    // Room 2
spawnZombie(0, 38);    // Courtyard
spawnZombie(-6, 42);   // Courtyard

// ------------------------------------------------------------------
// VIEWMODEL (Low-Poly Shotgun & Recoil)
// ------------------------------------------------------------------
const viewmodel = new THREE.Group();
const matGunMetal = new THREE.MeshLambertMaterial({ color: 0x222222 });

const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.8), matGunMetal);
barrel.position.set(0.15, -0.2, -0.6);
viewmodel.add(barrel);

const pump = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.3), matWood);
pump.position.set(0.15, -0.22, -0.5);
viewmodel.add(pump);

// Muzzle Flash
const flashGeo = new THREE.PlaneGeometry(0.3, 0.3);
const flashMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 });
const flash = new THREE.Mesh(flashGeo, flashMat);
flash.position.set(0.15, -0.2, -1.05);
flash.visible = false;
viewmodel.add(flash);

camera.add(viewmodel);
scene.add(camera);

// ------------------------------------------------------------------
// LIGHTING
// ------------------------------------------------------------------
scene.add(new THREE.AmbientLight(0x111111)); 
scene.add(new THREE.PointLight(0xffddaa, 0.8, 15)).position.set(0, 3, 5);   // R1
scene.add(new THREE.PointLight(0xff5555, 0.7, 12)).position.set(0, 3, 15);  // Hall
scene.add(new THREE.PointLight(0xffddaa, 0.8, 15)).position.set(0, 3, 25);  // R2
scene.add(new THREE.PointLight(0x4466aa, 1.0, 30)).position.set(0, 6, 40);  // Moon

// ------------------------------------------------------------------
// INPUT & MOVEMENT LOGIC
// ------------------------------------------------------------------
let yaw = 0, pitch = 0, locked = false;
const keys = {};

document.body.addEventListener('click', () => {
  if (!locked) {
    document.body.requestPointerLock();
  } else {
    fireWeapon();
  }
});

document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === document.body;
  document.getElementById('lookTip').className = locked ? 'hide' : '';
});

document.addEventListener('mousemove', (e) => {
  if (!locked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
});

document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);

// Physics Helper
function checkCollision(nx, nz) {
  const r = 0.3; // player radius
  for (let c of colliders) {
    if (nx + r > c.minX && nx - r < c.maxX && nz + r > c.minZ && nz - r < c.maxZ) {
      return true; // Hit a wall
    }
  }
  return false;
}

// Shooting Mechanics
let ammo = 8;
let recoilOffset = 0;

function fireWeapon() {
  if (ammo <= 0 || recoilOffset > 0.05) return;
  ammo--;
  document.getElementById('ammoCurrent').innerText = ammo;
  
  // Recoil effect
  recoilOffset = 0.15;
  pitch += 0.05; // Kick camera up slightly
  
  flash.visible = true;
  flash.rotation.z = Math.random() * Math.PI;
  setTimeout(() => flash.visible = false, 50);
}

// ------------------------------------------------------------------
// MAIN LOOP
// ------------------------------------------------------------------
const clock = new THREE.Clock();
let sway = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  camera.rotation.set(pitch, yaw, 0, 'YXZ');

  // Player Movement
  const speed = 4.5 * dt;
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(-forward.z, 0, forward.x);
  
  let mx = 0, mz = 0;
  if (keys['KeyW']) { mx += forward.x; mz += forward.z; }
  if (keys['KeyS']) { mx -= forward.x; mz -= forward.z; }
  if (keys['KeyD']) { mx += right.x; mz += right.z; }
  if (keys['KeyA']) { mx -= right.x; mz -= right.z; }

  // Normalize diagonal speed
  const len = Math.sqrt(mx*mx + mz*mz);
  if (len > 0) {
    mx = (mx / len) * speed;
    mz = (mz / len) * speed;
  }

  // Slide against walls (evaluate X and Z separately)
  if (!checkCollision(camera.position.x + mx, camera.position.z)) {
    camera.position.x += mx;
  }
  if (!checkCollision(camera.position.x, camera.position.z + mz)) {
    camera.position.z += mz;
  }

  // View bobbing and gun sway
  const isMoving = len > 0;
  const bob = performance.now() * 0.006;
  camera.position.y = 1.6 + (isMoving ? Math.sin(bob) * 0.04 : 0);
  
  sway += dt;
  
  // Gun recoil recovery
  if (recoilOffset > 0) recoilOffset -= dt * 0.5;
  if (recoilOffset < 0) recoilOffset = 0;

  viewmodel.position.x = Math.sin(sway * 1.2) * 0.005;
  viewmodel.position.y = (isMoving ? Math.abs(Math.sin(bob)) * 0.01 : 0);
  viewmodel.position.z = recoilOffset; // Gun kicks backwards

  // Zombie AI logic
  zombies.forEach(z => {
    const dx = camera.position.x - z.position.x;
    const dz = camera.position.z - z.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    
    // If player is close, turn and walk towards them
    if (dist < 18 && dist > 1.2) {
      z.lookAt(camera.position.x, 0, camera.position.z);
      
      // Simple collision for zombies too (don't walk through walls)
      const zx = z.position.x + (dx/dist) * 0.8 * dt;
      const zz = z.position.z + (dz/dist) * 0.8 * dt;
      if (!checkCollision(zx, z.position.z)) z.position.x = zx;
      if (!checkCollision(z.position.x, zz)) z.position.z = zz;
      
      // Zombie wobble walk
      z.position.y = Math.abs(Math.sin(sway * 4)) * 0.05;
    }
  });

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
