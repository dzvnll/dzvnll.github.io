<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEAD HALLS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; user-select: none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  
  canvas { 
    display: block; 
    width: 100vw !important; 
    height: 100vh !important;
    object-fit: fill;
    image-rendering: -moz-crisp-edges;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
  }

  /* NZP / Classic Zombies Style HUD */
  #hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
    font-family: 'VT323', monospace;
    font-weight: normal; text-transform: uppercase;
    display: none;
  }
  .hud-text { position: absolute; text-shadow: 2px 2px 0 #000, 3px 3px 0 #0a0a0a; }

  #round { bottom: 30px; left: 40px; font-size: 80px; color: #8a0303; }
  #roundNumber { color: #fff; }
  #points { bottom: 30px; right: 40px; font-size: 56px; color: #e6cc80; }
  #ammo { bottom: 90px; right: 40px; font-size: 42px; color: #fff; }
  #waveNotice {
    top: 30%; left: 50%; transform: translate(-50%, -50%);
    font-size: 72px; color: #8a0303; text-align: center;
    opacity: 0; transition: opacity 0.5s;
  }

  /* Classic Crosshair */
  #crosshair {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 15; pointer-events: none; display: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255, 255, 255, 0.6);
  }
  #crosshair::before { width: 12px; height: 2px; top: -1px; left: -6px; }
  #crosshair::after { width: 2px; height: 12px; top: -6px; left: -1px; }

  .menu-overlay {
    position: fixed; inset: 0;
    background: rgba(5, 5, 8, 0.9);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20; font-family: 'VT323', monospace;
    color: #fff; box-shadow: inset 0 0 100px #000;
  }
  
  h1 { font-size: 80px; color: #8a0303; margin-bottom: 20px; text-shadow: 4px 4px 0 #000; text-align: center; }
  p.sub { font-size: 24px; margin-bottom: 30px; color: #888; text-align: center; }

  .btn {
    background: #111; color: #fff; border: 2px solid #444;
    padding: 12px 28px; font-size: 28px; font-family: inherit;
    cursor: pointer; margin: 10px; width: 300px;
    transition: all 0.1s; text-shadow: 2px 2px 0 #000;
  }
  .btn:hover { background: #8a0303; border-color: #fff; transform: scale(1.05); }
  .btn:active { transform: scale(0.95); }

  #pauseMenu { display: none; }
  #mainMenu { display: flex; }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-text" id="waveNotice">WAVE <span id="waveNoticeNum">1</span></div>
  <div class="hud-text" id="round">ROUND <span id="roundNumber">1</span></div>
  <div class="hud-text" id="points">500</div>
  <div class="hud-text" id="ammo"><span id="ammoCurrent">8</span> / <span id="ammoReserve" style="color:#888">32</span></div>
</div>
<div id="crosshair"></div>

<div id="mainMenu" class="menu-overlay">
  <h1>DEAD HALLS</h1>
  <p class="sub">1: Bare Hands | 2: Shotgun<br>Space: Jump | R: Reload | Esc: Pause</p>
  <button class="btn" id="startBtn">START GAME</button>
</div>

<div id="pauseMenu" class="menu-overlay">
  <h1>PAUSED</h1>
  <button class="btn" id="resumeBtn">RESUME</button>
  <button class="btn" id="leaveBtn">LEAVE MAP</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ------------------------------------------------------------------
// ENGINE & STATE
// ------------------------------------------------------------------
const STATES = { MENU: 'menu', PLAYING: 'playing', PAUSED: 'paused' };
let currentGameState = STATES.MENU;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.08); 

const camera = new THREE.PerspectiveCamera(85, window.innerWidth/window.innerHeight, 0.05, 100);
camera.rotation.order = 'YXZ';
camera.position.set(0, 1.6, 4);

const RES_SCALE = 0.4; // Pixelated Retro Render
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(1);
renderer.outputEncoding = THREE.LinearEncoding; 
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap;
document.body.appendChild(renderer.domElement);

function resize() {
  renderer.setSize(window.innerWidth * RES_SCALE, window.innerHeight * RES_SCALE, false);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ------------------------------------------------------------------
// PROCEDURAL RETRO TEXTURES (ENV & GMOD-STYLE CHARACTERS)
// ------------------------------------------------------------------
function makeTex(type) {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128; // Higher res for characters
  const ctx = c.getContext('2d');

  if (type === 'wall') {
    ctx.fillStyle = '#3a3a3a'; ctx.fillRect(0,0,128,128);
    ctx.fillStyle = '#222'; ctx.fillRect(0, 0, 128, 8); ctx.fillRect(0, 120, 128, 8);
  } else if (type === 'floor') {
    ctx.fillStyle = '#111'; ctx.fillRect(0,0,128,128);
    ctx.fillStyle = '#1c1c1c'; ctx.fillRect(0,0,64,64); ctx.fillRect(64,64,64,64);
  } else if (type === 'dirt') {
    ctx.fillStyle = '#1c1612'; ctx.fillRect(0,0,128,128);
  } else if (type === 'wood') {
    ctx.fillStyle = '#2e1c10'; ctx.fillRect(0,0,128,128);
  } else if (type === 'zFace') {
    // UV Mapped Zombie Face
    ctx.fillStyle = '#6d7560'; ctx.fillRect(0,0,128,128); // Pale dead skin
    // Eyes
    ctx.fillStyle = '#111'; ctx.fillRect(40, 48, 12, 12); ctx.fillRect(76, 48, 12, 12);
    // Mouth/Blood
    ctx.fillStyle = '#3a0000'; ctx.fillRect(50, 80, 28, 20);
    // Bloody neck
    ctx.fillStyle = 'rgba(60,0,0,0.5)'; ctx.fillRect(0, 110, 128, 18);
  } else if (type === 'zShirt') {
    // UV Mapped Dirty Shirt
    ctx.fillStyle = '#4a5057'; ctx.fillRect(0,0,128,128);
    ctx.fillStyle = '#2c3035'; ctx.fillRect(0, 0, 128, 15); // Collar
    // Blood stains
    ctx.fillStyle = '#400';
    ctx.beginPath(); ctx.arc(64, 50, 30, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(90, 80, 20, 0, Math.PI*2); ctx.fill();
  } else if (type === 'zPants') {
    // UV Mapped Jeans
    ctx.fillStyle = '#2c3545'; ctx.fillRect(0,0,128,128);
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, 128, 12); // Belt
    ctx.fillStyle = '#1c1612'; ctx.fillRect(0, 100, 128, 28); // Mud at bottom
  } else if (type === 'skin') {
    ctx.fillStyle = '#b59982'; ctx.fillRect(0,0,128,128);
  } else if (type === 'gunMetal') {
    ctx.fillStyle = '#2a2a2c'; ctx.fillRect(0,0,128,128);
  }

  // Gritty heavy noise pass
  for (let i = 0; i < 4000; i++) {
    const r = Math.random();
    if (r > 0.5) ctx.fillStyle = 'rgba(0,0,0,0.4)';
    else if (r > 0.1) ctx.fillStyle = 'rgba(255,255,255,0.06)';
    else if (type === 'wall' || type === 'floor') ctx.fillStyle = 'rgba(60, 5, 5, 0.5)'; // Blood specks
    else ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(Math.floor(Math.random()*64)*2, Math.floor(Math.random()*64)*2, 2, 2);
  }

  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = tex.minFilter = THREE.NearestFilter; 
  tex.generateMipmaps = false; tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

const matWall = new THREE.MeshLambertMaterial({ map: makeTex('wall') });
const matFloor  = new THREE.MeshLambertMaterial({ map: makeTex('floor') });
const matDirt  = new THREE.MeshLambertMaterial({ map: makeTex('dirt') });
const matSkin = new THREE.MeshLambertMaterial({ map: makeTex('skin') }); 
const matShirt = new THREE.MeshLambertMaterial({ color: 0x3a423a });
const matPants = new THREE.MeshLambertMaterial({ color: 0x222228 });

// ------------------------------------------------------------------
// MAP GEN
// ------------------------------------------------------------------
const colliders = [];
const spawnPoints = [
  new THREE.Vector3(0, 0, 16),
  new THREE.Vector3(-4, 0, 26),
  new THREE.Vector3(4, 0, 28),
  new THREE.Vector3(0, 0, 40),
  new THREE.Vector3(-7, 0, 43),
  new THREE.Vector3(7, 0, 43)
];

function addWall(x, z, w, d) {
  const geo = new THREE.BoxGeometry(w, 4, d);
  const uvs = geo.attributes.uv;
  for (let i = 0; i < uvs.count; i++) { uvs.setX(i, uvs.getX(i)*(w>d?w/4:d/4)); uvs.setY(i, uvs.getY(i)); }
  const m = new THREE.Mesh(geo, matWall);
  m.position.set(x, 2, z); 
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
  colliders.push({ minX: x-w/2, maxX: x+w/2, minZ: z-d/2, maxZ: z+d/2 });
}

function addFloor(x, z, w, d, mat, hasCeiling = true) {
  const f = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d), mat);
  f.position.set(x, -0.1, z); 
  f.receiveShadow = true;
  scene.add(f);
  if (hasCeiling) {
    const c = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d), matWall);
    c.position.set(x, 4.1, z); 
    c.receiveShadow = true;
    scene.add(c);
  }
}

addFloor(0, 4, 10, 10, matFloor); addWall(0, -1.5, 10, 1);
addWall(-5.5, 4, 1, 12); addWall(5.5, 4, 1, 12); addWall(-3.5, 9.5, 5, 1); addWall(3.5, 9.5, 5, 1);
addFloor(0, 15, 4, 10, matFloor); addWall(-2.5, 15, 1, 10); addWall(2.5, 15, 1, 10);
addFloor(0, 25, 12, 10, matFloor); addWall(-4.5, 19.5, 5, 1); addWall(4.5, 19.5, 5, 1); 
addWall(-6.5, 25, 1, 12); addWall(6.5, 25, 1, 12); addWall(-4, 30.5, 6, 1); addWall(4, 30.5, 6, 1);
addFloor(0, 41, 20, 20, matDirt, false); addWall(-10.5, 41, 1, 22); addWall(10.5, 41, 1, 22); 
addWall(0, 51.5, 22, 1); addWall(-7.5, 30.5, 5, 1); addWall(7.5, 30.5, 5, 1);

scene.add(new THREE.AmbientLight(0x1a1a20));
function addPointLight(color, intensity, dist, x, y, z, castShadow) {
  const pl = new THREE.PointLight(color, intensity, dist);
  pl.position.set(x, y, z);
  if (castShadow) {
    pl.castShadow = true; pl.shadow.mapSize.width = 256; pl.shadow.mapSize.height = 256; pl.shadow.bias = -0.005;
  }
  scene.add(pl);
}
addPointLight(0xffa555, 1.2, 12, 0, 3, 4, true); addPointLight(0xff2211, 1.0, 10, 0, 3, 15, false);
addPointLight(0xffa555, 1.2, 14, 0, 3, 25, true); addPointLight(0x4477ff, 1.5, 25, 0, 7, 40, true);

// ------------------------------------------------------------------
// FULL PLAYER BODY (GMOD-ish Proportions)
// ------------------------------------------------------------------
const playerBody = new THREE.Group();
const pTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.22, 0.7, 8), matShirt);
pTorso.position.y = 1.0; pTorso.castShadow = true; playerBody.add(pTorso);

const pLegL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.08, 0.9, 8), matPants);
pLegL.position.set(-0.15, 0.45, 0); pLegL.castShadow = true; playerBody.add(pLegL);

const pLegR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.08, 0.9, 8), matPants);
pLegR.position.set(0.15, 0.45, 0); pLegR.castShadow = true; playerBody.add(pLegR);
scene.add(playerBody);

// ------------------------------------------------------------------
// VIEWMODELS (Hands & Shotgun) - Rebuilt with Cylinders
// ------------------------------------------------------------------
const viewmodel = new THREE.Group();
const vmShotgun = new THREE.Group();
const vmHands = new THREE.Group();

const matGunMetal = new THREE.MeshLambertMaterial({ map: makeTex('gunMetal') });
const matGunWood = new THREE.MeshLambertMaterial({ map: makeTex('wood') });

// Real-ish Shotgun (Cylinders)
const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 1.0, 8), matGunMetal);
barrel.rotation.x = Math.PI / 2; barrel.position.set(0.25, -0.22, -0.6); vmShotgun.add(barrel);

const magTube = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.8, 8), matGunMetal);
magTube.rotation.x = Math.PI / 2; magTube.position.set(0.25, -0.27, -0.5); vmShotgun.add(magTube);

const pump = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.35, 8), matGunWood);
pump.rotation.x = Math.PI / 2; pump.position.set(0.25, -0.27, -0.5); vmShotgun.add(pump);

const reciever = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.1, 0.25), matGunMetal);
reciever.position.set(0.25, -0.24, -0.1); vmShotgun.add(reciever);

const stock = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.14, 0.35), matGunWood);
stock.position.set(0.25, -0.28, 0.15); stock.rotation.x = -0.15; vmShotgun.add(stock);

const flash = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.4), new THREE.MeshBasicMaterial({ color: 0xffdd00, transparent: true, side: THREE.DoubleSide }));
flash.position.set(0.25, -0.22, -1.15); flash.visible = false; vmShotgun.add(flash);

// Cylindrical Bare Hands
const hLeft = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.4, 8), matSkin);
hLeft.rotation.x = Math.PI / 2; hLeft.position.set(-0.35, -0.25, -0.4); vmHands.add(hLeft);
const hRight = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.4, 8), matSkin);
hRight.rotation.x = Math.PI / 2; hRight.position.set(0.35, -0.25, -0.4); vmHands.add(hRight);

viewmodel.add(vmShotgun);
viewmodel.add(vmHands);
camera.add(viewmodel);
scene.add(camera);

// ------------------------------------------------------------------
// REAL-ISH SKELETAL ZOMBIES (GMOD/HL1 Style)
// ------------------------------------------------------------------
const zombies = [];
let targets = []; // Changed to let so we can re-assign when filtering despawns

const matZFace = new THREE.MeshLambertMaterial({ map: makeTex('zFace') });
const matZShirt = new THREE.MeshLambertMaterial({ map: makeTex('zShirt') });
const matZPants = new THREE.MeshLambertMaterial({ map: makeTex('zPants') });
const matZSkin = new THREE.MeshLambertMaterial({ map: makeTex('zFace') }); 

function makeCylinderBone(rT, rB, h, mat, shiftY) {
  const geo = new THREE.CylinderGeometry(rT, rB, h, 8);
  geo.translate(0, shiftY, 0);
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

function spawnZombie(x, z, spdMult) {
  const root = new THREE.Group();
  
  // Torso
  const torso = makeCylinderBone(0.25, 0.22, 0.75, matZShirt, 0.375);
  torso.position.y = 0.9; root.add(torso);

  // Spherical Head
  const headGeo = new THREE.SphereGeometry(0.22, 12, 12);
  headGeo.translate(0, 0.2, 0); // Shift pivot to neck
  headGeo.rotateY(Math.PI); // Rotate texture to face front
  const head = new THREE.Mesh(headGeo, matZFace);
  head.position.y = 0.75; head.castShadow = true; torso.add(head);

  // Arms
  const armL = makeCylinderBone(0.08, 0.06, 0.7, matZSkin, -0.35);
  armL.position.set(-0.32, 0.7, 0); armL.rotation.x = -Math.PI/2 + 0.2; torso.add(armL);
  
  const armR = makeCylinderBone(0.08, 0.06, 0.7, matZSkin, -0.35);
  armR.position.set(0.32, 0.7, 0); armR.rotation.x = -Math.PI/2 + 0.2; torso.add(armR);

  // Legs
  const legL = makeCylinderBone(0.12, 0.09, 0.9, matZPants, -0.45);
  legL.position.set(-0.15, 0, 0); torso.add(legL);

  const legR = makeCylinderBone(0.12, 0.09, 0.9, matZPants, -0.45);
  legR.position.set(0.15, 0, 0); torso.add(legR);

  root.position.set(x, 0, z);
  scene.add(root);

  const data = { mesh: root, hp: 100, isDead: false, animTime: Math.random()*10, speed: 1.8 * spdMult, parts: [torso, head, armL, armR, legL, legR] };
  zombies.push(data);
  root.traverse(c => { if(c.isMesh) { c.userData.zData = data; targets.push(c); } });
}

// ------------------------------------------------------------------
// WAVE SYSTEM
// ------------------------------------------------------------------
let currentRound = 1;
let zombiesAlive = 0;

function startWave() {
  document.getElementById('roundNumber').innerText = currentRound;
  
  const notice = document.getElementById('waveNotice');
  document.getElementById('waveNoticeNum').innerText = currentRound;
  notice.style.opacity = 1;
  setTimeout(() => notice.style.opacity = 0, 3000);

  const toSpawn = 4 + (currentRound * 2);
  zombiesAlive = toSpawn;

  for (let i=0; i<toSpawn; i++) {
    const pt = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
    const ox = (Math.random()-0.5)*2; const oz = (Math.random()-0.5)*2;
    spawnZombie(pt.x + ox, pt.z + oz, 1 + (currentRound * 0.15));
  }
}

// ------------------------------------------------------------------
// INPUT & POINTER LOCK
// ------------------------------------------------------------------
let yaw = 0, pitch = 0;
const keys = {};

document.getElementById('startBtn').addEventListener('click', () => document.body.requestPointerLock());
document.getElementById('resumeBtn').addEventListener('click', () => document.body.requestPointerLock());

document.getElementById('leaveBtn').addEventListener('click', () => {
  currentGameState = STATES.MENU;
  document.getElementById('pauseMenu').style.display = 'none';
  document.getElementById('mainMenu').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('crosshair').style.display = 'none';
  
  zombies.forEach(z => scene.remove(z.mesh));
  zombies.length = 0; targets.length = 0;
  currentRound = 1; zombiesAlive = 0;
  pts = 500; ammoCur = 8; ammoRes = 32;
  
  document.getElementById('points').innerText = pts;
  document.getElementById('ammoCurrent').innerText = ammoCur;
  document.getElementById('ammoReserve').innerText = ammoRes;
  
  camera.position.set(0, 1.6, 4); yaw = 0; pitch = 0;
});

document.addEventListener('pointerlockchange', () => {
  const isLocked = document.pointerLockElement === document.body;
  if (isLocked) {
    currentGameState = STATES.PLAYING;
    document.getElementById('mainMenu').style.display = 'none'; document.getElementById('pauseMenu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    
    if (equipped === 1) document.getElementById('crosshair').style.display = 'block';
    if (zombiesAlive === 0 && currentRound === 1 && zombies.length === 0) startWave();
    
  } else if (currentGameState === STATES.PLAYING) {
    currentGameState = STATES.PAUSED;
    document.getElementById('pauseMenu').style.display = 'flex'; document.getElementById('crosshair').style.display = 'none';
  }
});

document.addEventListener('keydown', e => { 
  if (currentGameState === STATES.PLAYING) {
    keys[e.code] = true; 
    if (e.code === 'Space' && isGrounded) jump();
    if (e.code === 'KeyR' && equipped === 1) initiateReload();
    if (e.code === 'Digit1') switchWeapon(0);
    if (e.code === 'Digit2') switchWeapon(1);
  }
});
document.addEventListener('keyup', e => keys[e.code] = false);

document.addEventListener('mousemove', e => {
  if (currentGameState !== STATES.PLAYING) return;
  yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
});

// ------------------------------------------------------------------
// COMBAT & HIT DETECTION
// ------------------------------------------------------------------
let ammoCur = 8, ammoRes = 32, pts = 500;
let isReloading = false; let equipped = 1; 
const raycaster = new THREE.Raycaster();

function switchWeapon(id) {
  if (isReloading) return;
  equipped = id; vmHands.visible = (id === 0); vmShotgun.visible = (id === 1);
  document.getElementById('ammo').style.display = id === 1 ? 'block' : 'none';
  if (currentGameState === STATES.PLAYING) document.getElementById('crosshair').style.display = id === 1 ? 'block' : 'none';
}
switchWeapon(equipped);

function initiateReload() {
  if (isReloading || ammoCur === 8 || ammoRes === 0) return;
  isReloading = true;
  pump.position.z -= 0.1; setTimeout(() => pump.position.z += 0.1, 300);
  setTimeout(() => {
    const need = 8 - ammoCur; const pull = Math.min(need, ammoRes);
    ammoCur += pull; ammoRes -= pull;
    document.getElementById('ammoCurrent').innerText = ammoCur;
    document.getElementById('ammoReserve').innerText = ammoRes;
    isReloading = false;
  }, 1000);
}

document.body.addEventListener('mousedown', e => {
  if (currentGameState !== STATES.PLAYING || e.button !== 0) return;
  
  if (equipped === 0) {
    hRight.position.z -= 0.3; hRight.rotation.y = 0.5;
    setTimeout(() => { hRight.position.z += 0.3; hRight.rotation.y = 0; }, 150);
    return;
  }

  if (isReloading || ammoCur <= 0) { if (ammoCur === 0) initiateReload(); return; }
  ammoCur--; document.getElementById('ammoCurrent').innerText = ammoCur;
  
  pitch += 0.08; viewmodel.position.z += 0.2; pump.position.z -= 0.15; 
  setTimeout(() => { viewmodel.position.z -= 0.2; pump.position.z += 0.15; }, 150);

  flash.visible = true; flash.rotation.z = Math.random() * Math.PI;
  setTimeout(() => flash.visible = false, 50);

  raycaster.setFromCamera({ x: 0, y: 0 }, camera);
  const hits = raycaster.intersectObjects(targets);
  if (hits.length > 0) {
    const zData = hits[0].object.userData.zData;
    if (zData && !zData.isDead) {
      zData.hp -= 55; pts += 10; document.getElementById('points').innerText = pts;
      
      zData.parts.forEach(p => { p.material.color.setHex(0xff0000); });
      setTimeout(() => {
        if (!zData.isDead) zData.parts.forEach(p => { p.material.color.setHex(0xffffff); });
      }, 100);

      zData.mesh.translateZ(-0.6); // Knockback

      if (zData.hp <= 0) {
        zData.isDead = true; pts += 60; document.getElementById('points').innerText = pts;
        zData.parts.forEach(p => { p.material.color.setHex(0x330000); });
        zombiesAlive--;
        if (zombiesAlive <= 0) { currentRound++; setTimeout(startWave, 2500); }
      }
    }
  }
});

// ------------------------------------------------------------------
// PHYSICS & MAIN LOOP
// ------------------------------------------------------------------
let velY = 0; const grav = 18; let isGrounded = true;
function jump() { velY = 7.5; isGrounded = false; }

function checkCol(nx, nz) {
  for (let c of colliders) if (nx+0.3 > c.minX && nx-0.3 < c.maxX && nz+0.3 > c.minZ && nz-0.3 < c.maxZ) return true;
  return false;
}

const clock = new THREE.Clock(); let sway = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  if (currentGameState === STATES.PLAYING) {
    camera.rotation.set(pitch, yaw, 0, 'YXZ');

    const speed = (keys['ShiftLeft'] ? 7.0 : 4.5) * dt;
    const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const rgt = new THREE.Vector3(-fwd.z, 0, fwd.x);
    let mx = 0, mz = 0;
    if (keys['KeyW']) { mx+=fwd.x; mz+=fwd.z; }
    if (keys['KeyS']) { mx-=fwd.x; mz-=fwd.z; }
    if (keys['KeyD']) { mx+=rgt.x; mz+=rgt.z; }
    if (keys['KeyA']) { mx-=rgt.x; mz-=rgt.z; }

    const len = Math.sqrt(mx*mx + mz*mz);
    if (len > 0) { mx=(mx/len)*speed; mz=(mz/len)*speed; }
    if (!checkCol(camera.position.x + mx, camera.position.z)) camera.position.x += mx;
    if (!checkCol(camera.position.x, camera.position.z + mz)) camera.position.z += mz;

    if (!isGrounded) {
      velY -= grav * dt;
      camera.position.y += velY * dt;
      if (camera.position.y <= 1.6) { camera.position.y = 1.6; velY = 0; isGrounded = true; }
    }

    playerBody.position.set(camera.position.x, camera.position.y - 1.6, camera.position.z);
    playerBody.rotation.y = yaw;
    if (len > 0 && isGrounded) {
      const walkT = performance.now() * 0.015;
      pLegL.rotation.x = Math.sin(walkT) * 0.6; pLegR.rotation.x = Math.sin(walkT + Math.PI) * 0.6;
    } else {
      pLegL.rotation.x = pLegR.rotation.x = 0;
    }

    sway += dt; const bob = performance.now() * 0.01;
    const isMoving = len > 0;

    if (equipped === 1) { 
      viewmodel.position.x = THREE.MathUtils.lerp(viewmodel.position.x, 0, 0.1);
      viewmodel.position.y = THREE.MathUtils.lerp(viewmodel.position.y, 0, 0.1);
      viewmodel.position.z = THREE.MathUtils.lerp(viewmodel.position.z, 0, 0.1);
      if (isReloading) viewmodel.position.y -= 0.15;
      viewmodel.position.x += Math.sin(sway*1.5)*0.002;
      if (isMoving && isGrounded) { viewmodel.position.y += Math.sin(bob*1.2) * 0.01; viewmodel.position.x += Math.cos(bob*0.6) * 0.01; }
    } else { 
      if (isMoving && isGrounded) {
        hLeft.position.y = -0.25 + Math.sin(bob*1.5) * 0.05; hRight.position.y = -0.25 + Math.sin(bob*1.5 + Math.PI) * 0.05;
      } else { hLeft.position.y = hRight.position.y = -0.25; }
    }

    // TRUE DESPAWN LOGIC & ZOMBIE AI
    for (let i = zombies.length - 1; i >= 0; i--) {
      const z = zombies[i];
      const mesh = z.mesh;
      
      if (z.isDead) {
        if (mesh.rotation.x > -Math.PI/2) mesh.rotation.x -= dt * 4;
        mesh.position.y -= dt * 2; 
        
        // Fully purge from the scene and memory when they sink below the map
        if (mesh.position.y < -2.0) {
            scene.remove(mesh);
            targets = targets.filter(t => t.userData.zData !== z); // Remove from raycasting
            zombies.splice(i, 1); // Remove from logic array
        }
        continue;
      }
      
      const dx = camera.position.x - mesh.position.x; const dz = camera.position.z - mesh.position.z;
      const dist = Math.sqrt(dx*dx + dz*dz);

      if (dist > 1.2) {
        mesh.lookAt(camera.position.x, 0, camera.position.z);
        const sx = (dx/dist) * z.speed * dt; const sz = (dz/dist) * z.speed * dt;
        if (!checkCol(mesh.position.x + sx, mesh.position.z)) mesh.position.x += sx;
        if (!checkCol(mesh.position.x, mesh.position.z + sz)) mesh.position.z += sz;

        z.animTime += dt * (8 * (z.speed/1.8)); 
        const [torso, head, aL, aR, lL, lR] = z.parts;
        
        lL.rotation.x = Math.sin(z.animTime) * 0.8; lR.rotation.x = Math.sin(z.animTime + Math.PI) * 0.8;
        aL.rotation.x = -Math.PI/2 + 0.4 + Math.sin(z.animTime)*0.2; aR.rotation.x = -Math.PI/2 + 0.4 + Math.sin(z.animTime+Math.PI)*0.2;
        torso.position.y = 0.9 + Math.abs(Math.sin(z.animTime)) * 0.1; torso.rotation.z = Math.sin(z.animTime*0.5) * 0.1;
      }
    }
  }
  renderer.render(scene, camera);
}
animate();
</script>
