        let actx = null;
        function ensureAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
        
        // Realistic Gunshot Sound Generation
        function playShot(type = "shotgun") {
            ensureAudio();
            const t = actx.currentTime;
            const noise = actx.createBufferSource();
            const buf = actx.createBuffer(1, actx.sampleRate * 0.4, actx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 3);
            noise.buffer = buf;
            const filt = actx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.setValueAtTime(type === "ar" ? 5000 : 3000, t);
            filt.frequency.exponentialRampToValueAtTime(100, t+(type === "ar"?0.2:0.3));
            
            const gain = actx.createGain();
            gain.gain.setValueAtTime(type === "ar" ? 0.7 : 1.0, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t+(type === "ar"?0.15:0.25));
            
            noise.connect(filt); filt.connect(gain); gain.connect(actx.destination);
            noise.start(t); noise.stop(t+0.4);
        }
        
        function playThud(freq) {
            ensureAudio();
            const t = actx.currentTime;
            const osc = actx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, t);
            osc.frequency.exponentialRampToValueAtTime(freq*0.2, t+0.15);
            const gain = actx.createGain();
            gain.gain.setValueAtTime(0.6, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t+0.15);
            osc.connect(gain); gain.connect(actx.destination);
            osc.start(t); osc.stop(t+0.16);
        }

        // Improved Zombie Growl
        function playGrowl() {
            ensureAudio();
            const t = actx.currentTime;
            const osc = actx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(60 + Math.random()*20, t);
            osc.frequency.linearRampToValueAtTime(30, t+0.8);
            
            const filt = actx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.setValueAtTime(600, t);
            filt.frequency.linearRampToValueAtTime(200, t+0.8);

            const gain = actx.createGain();
            gain.gain.setValueAtTime(0.4, t);
            gain.gain.linearRampToValueAtTime(0.0, t+0.8);
            
            osc.connect(filt); filt.connect(gain); gain.connect(actx.destination);
            osc.start(t); osc.stop(t+0.8);
        }

} 

if (fireCooldown > 0) fireCooldown -= dt;
if (isMouseDown && equipped !== 0 && guns[equipped].auto && fireCooldown <= 0) fireGun();
else if (isMouseDown && equipped !== 0 && !guns[equipped].auto && fireCooldown <= 0) { fireGun(); isMouseDown = false; } // semi-auto lock
else if (isMouseDown && equipped === 0 && fireCooldown <= 0) {
    hRight.position.z -= 0.3; hRight.rotation.y = 0.5; setTimeout(() => { hRight.position.z += 0.3; hRight.rotation.y = 0; }, 150);
    playThud(300); raycaster.setFromCamera({ x: 0, y: 0 }, camera);
    const hits = raycaster.intersectObjects(targets); if (hits.length > 0 && hits[0].distance < 2.2) {
    const zData = hits[0].object.userData.zData; if (zData && !zData.isDead) { zData.mesh.translateZ(-0.2); applyDamageToZombie(zData, 60, hits[0].point); } }
    fireCooldown = 0.4;
}

if (performance.now() - lastHitTime > 6000 && playerHP < MAX_HP) {
playerHP = Math.min(MAX_HP, playerHP + dt * 4); updateHpBar();
} 

// Wave spawning logic
if (zombiesToSpawn > 0 && zombies.length < 24) {
    waveSpawnTimer -= dt;
    if (waveSpawnTimer <= 0) {
        const pt = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
        const ox = (Math.random()-0.5)*2; const oz = (Math.random()-0.5)*2;
        spawnZombie(pt.x + ox, pt.z + oz, 1 + (currentRound * 0.05), 1 + (currentRound * 0.15));
        zombiesToSpawn--; waveSpawnTimer = 0.5 + Math.random()*1.5;
    }
}

for (let i = zombies.length - 1; i >= 0; i--) {
const z = zombies[i]; const mesh = z.mesh;
if (z.isDead) { if (mesh.rotation.x > -Math.PI/2) mesh.rotation.x -= dt * 5;
mesh.position.y -= dt * 1.5; if (mesh.position.y < -1.5) {
scene.remove(mesh); targets = targets.filter(t => t.userData.zData !== z);
zombies.splice(i, 1); z.parts.forEach(p => {
if (p.geometry) p.geometry.dispose(); if (p.material) { if (p.material.map) p.material.map.dispose(); p.material.dispose(); }
}); }
continue; }
const dx = camera.position.x - mesh.position.x; const dz = camera.position.z - mesh.position.z; const dist = Math.sqrt(dx*dx + dz*dz);
const [torso, head, aL, aR, lL, lR] = z.parts; z.attackCd -= dt;
if (dist > 1.3) { mesh.lookAt(camera.position.x, 0, camera.position.z);
const sx = (dx/dist) * z.speed * dt; const sz = (dz/dist) * z.speed * dt; if (!checkCol(mesh.position.x + sx, mesh.position.z)) mesh.position.x += sx;
if (!checkCol(mesh.position.x, mesh.position.z + sz)) mesh.position.z += sz; z.animTime += dt * (12 * (z.speed/2.2));
lL.rotation.x = Math.sin(z.animTime) * 1.0; lR.rotation.x = Math.sin(z.animTime + Math.PI) * 1.0;
aL.rotation.x = -Math.PI/2 + 0.2 + Math.sin(z.animTime*0.5)*0.1; aR.rotation.x = -Math.PI/2 + 0.2 + Math.sin(z.animTime*0.5 + Math.PI)*0.1;
torso.position.y = 1.0 + Math.abs(Math.sin(z.animTime)) * 0.15; torso.rotation.z = Math.sin(z.animTime*0.5) * 0.1;
} else { mesh.lookAt(camera.position.x, 0, camera.position.z);
z.animTime += dt * 8; aL.rotation.x = -Math.PI/2 + Math.sin(z.animTime) * 0.6;
aR.rotation.x = -Math.PI/2 + Math.sin(z.animTime + Math.PI) * 0.6; if (z.attackCd <= 0) {
z.attackCd = 1.0; damagePlayer(z.dmg);
} }
} for (let i = bloodParticles.length - 1; i >= 0; i--) {
const p = bloodParticles[i]; p.life += dt;
p.vel.y -= 9.8 * dt; p.mesh.position.addScaledVector(p.vel, dt);
p.mesh.material.opacity = Math.max(0, 1 - p.life/p.maxLife); if (p.life >= p.maxLife || p.mesh.position.y <= 0) {
scene.remove(p.mesh); p.mesh.material.dispose();
bloodParticles.splice(i, 1); }
} }
renderer.render(scene, camera); }
animate(); </script>
