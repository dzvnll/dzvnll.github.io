<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deadhalls: HD Overhaul</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap');
* { margin:0; padding:0; box-sizing:border-box; user-select: none; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
canvas {
    display: block; width: 100vw !important; height: 100vh !important; object-fit: fill;
    /* Removed pixelated rendering for smoother HD look */
}
#hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
    font-family: 'Oswald', sans-serif; font-weight: normal; text-transform: uppercase; display: none;
}
.hud-text { position: absolute; text-shadow: 1px 1px 4px #000, 2px 2px 4px #000; }
#round { bottom: 20px; left: 30px; font-size: 64px; color: #a30000; }
#roundNumber { color: #fff; text-shadow: 2px 2px 0 #a30000; }
#points { bottom: 20px; right: 40px; font-size: 56px; color: #ffcc00; }
#ammo { bottom: 80px; right: 40px; font-size: 42px; color: #fff; }
#waveNotice {
    top: 30%; left: 50%; transform: translate(-50%, -50%);
    font-size: 70px; color: #a30000; text-align: center; opacity: 0; transition: opacity 0.5s;
}
#promptText {
    bottom: 140px; left: 50%; transform: translateX(-50%);
    font-size: 28px; color: #fff; text-align: center; opacity: 0; transition: opacity 0.2s; white-space: nowrap;
}
#hpWrap {
    bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 20px; background: rgba(40,0,0,0.7);
}
#hpFill { position:absolute; top:0; left:0; bottom:0; width:100%; background:#a30000; transition: width 0.2s; }
#dmgVignette {
    position:fixed; inset:0; box-shadow: inset 0 0 150px 40px rgba(150,0,0,0.9);
    opacity: 0; transition: opacity 0.15s; pointer-events:none; z-index: 9;
}
#crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 15; pointer-events: none; display: none;
}
#crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.8); }
#crosshair::before { width: 14px; height: 2px; top: -1px; left: -7px; }
#crosshair::after { width: 2px; height: 14px; top: -7px; left: -1px; }
#hitmarker {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 24px; font-family: sans-serif; color: #fff; z-index: 16; pointer-events: none; opacity: 0; transition: opacity 0.08s;
}
.menu-overlay {
    position: fixed; inset: 0; background: rgba(10, 10, 10, 0.95);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; font-family: 'Oswald', sans-serif; color: #fff;
}
h1 { font-size: 80px; color: #a30000; margin-bottom: 10px; text-shadow: 2px 2px 0 #000; text-align: center; }
p.sub { font-size: 24px; margin-bottom: 40px; color: #aaa; text-align: center; }
.btn {
    background: #1a1a1a; color: #fff; border: 2px solid #333; padding: 15px 40px;
    font-size: 28px; font-family: inherit; cursor: pointer; margin: 10px; width: 350px; transition: all 0.1s;
}
.btn:hover { background: #333; border-color: #ffcc00; }
#pauseMenu, #gameOverMenu, #settingsMenu { display: none; }
#mainMenu { display: flex; align-items: center; justify-content: center; }
.settings-row { display: flex; align-items: center; justify-content: space-between; width: 460px; margin: 16px 0; font-size: 22px; }
.settings-row input[type="range"] { width: 200px; accent-color: #a30000; }
.settings-row select, .settings-row button.toggle {
    background: #1a1a1a; color: #fff; border: 2px solid #333; font-family: inherit; font-size: 18px; padding: 4px 10px;
}
</style>
</head>
<body>
<div id="hud">
    <div class="hud-text" id="waveNotice">wave <span id="waveNoticeNum">1</span></div>
    <div class="hud-text" id="round">round <span id="roundNumber">1</span></div>
    <div class="hud-text" id="points">500</div>
    <div class="hud-text" id="ammo"><span id="ammoCurrent">8</span> / <span id="ammoReserve" style="color:#888">32</span></div>
    <div class="hud-text" id="promptText">E</div>
    <div id="hpWrap" class="hud-text"><div id="hpFill"></div></div>
</div>
<div id="dmgVignette"></div><div id="crosshair"></div><div id="hitmarker">✕</div>

<div id="mainMenu" class="menu-overlay">
    <h1>deadhalls</h1>
    <p class="sub"> &nbsp;|&nbsp;  &nbsp;|&nbsp; </p>
    <button class="btn" id="startBtn"></button>
    <button class="btn" id="settingsBtn"></button>
</div>
<div id="settingsMenu" class="menu-overlay">
    <h1>settings</h1>
    <div class="settings-row"><label>Sensitivity</label><input type="range" id="sensSlider" min="1" max="10" value="4"></div>
    <div class="settings-row">
        <label>resolution scale</label>
        <select id="resSelect">
            <option value="0.5">Low</option><option value="0.75">Medium</option><option value="1" selected>Native</option>
        </select>
    </div>
    <button class="btn" id="settingsBackBtn" style="margin-top:30px;">back</button>
</div>
<div id="pauseMenu" class="menu-overlay">
    <h1>PAUSED</h1><button class="btn" id="resumeBtn">RESUME</button><button class="btn" id="leaveBtn">LEAVE</button>
</div>
<div id="gameOverMenu" class="menu-overlay">
    <h1>YOU DIED</h1><p class="sub" id="gameOverStats"></p><button class="btn" id="restartBtn">TRY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let actx = null;
function ensureAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }

// Remastered realistic audio synthesis
function playShot(isHeavy = false) {
    ensureAudio(); const t = actx.currentTime;
    const osc = actx.createOscillator(); const gain = actx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(isHeavy ? 150 : 250, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
    gain.gain.setValueAtTime(1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + (isHeavy ? 0.3 : 0.15));
    
    // Add white noise for the "crack" of a gunshot
    const noise = actx.createBufferSource();
    const buf = actx.createBuffer(1, actx.sampleRate * 0.2, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.5;
    noise.buffer = buf;
    const noiseGain = actx.createGain();
    noiseGain.gain.setValueAtTime(0.8, t); noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);

    osc.connect(gain); gain.connect(actx.destination);
    noise.connect(noiseGain); noiseGain.connect(actx.destination);
    osc.start(t); osc.stop(t + 0.3); noise.start(t); noise.stop(t + 0.2);
}

function playGrowl() {
    ensureAudio(); const t = actx.currentTime;
    const osc = actx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(80 + Math.random()*20, t);
    osc.frequency.linearRampToValueAtTime(50, t+0.8);
    const gain = actx.createGain(); gain.gain.setValueAtTime(0.4, t); gain.gain.linearRampToValueAtTime(0.0, t+0.8);
    osc.connect(gain); gain.connect(actx.destination); osc.start(t); osc.stop(t+0.8);
}
function playDamage() { playShot(true); }
function playChime() {
    ensureAudio(); const t = actx.currentTime;
    const osc = actx.createOscillator(); osc.type = 'sine';
    osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(300, t+0.4);
    const gain = actx.createGain(); gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t+0.4);
    osc.connect(gain); gain.connect(actx.destination); osc.start(t); osc.stop(t+0.4);
}

const STATES = { MENU: 'menu', PLAYING: 'playing', PAUSED: 'paused', DEAD: 'dead' };
let currentGameState = STATES.MENU;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);
scene.fog = new THREE.FogExp2(0x050505, 0.04);
const camera = new THREE.PerspectiveCamera(85, window.innerWidth/window.innerHeight, 0.01, 100);
camera.rotation.order = 'YXZ'; camera.position.set(0, 1.6, 4);

let RES_SCALE = 1;
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

function resize() {
    renderer.setSize(window.innerWidth * RES_SCALE, window.innerHeight * RES_SCALE, false);
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

// HD Textures
function makeSmoothColor(hex) { return new THREE.MeshStandardMaterial({ color: hex, roughness: 0.8 }); }
const matWall = makeSmoothColor(0x3a3a3a);
const matFloor = makeSmoothColor(0x222222);
const matDirt = makeSmoothColor(0x1a1512);
const matGunMetal = makeSmoothColor(0x222222);
const matGunWood = makeSmoothColor(0x3e2723);
const matSkin = makeSmoothColor(0xc5a085);
const matPlayerCloth = makeSmoothColor(0x2b3a2e);
const matBarrier = makeSmoothColor(0x5a3a1a);

const colliders = [];
const interactables = []; // Wallbuys and Barriers
const spawnPoints = [];

function addWall(x, z, w, d, id) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, 5, d), matWall);
    m.position.set(x, 2.5, z); m.castShadow = true; m.receiveShadow = true; scene.add(m);
    colliders.push({ minX: x-w/2, maxX: x+w/2, minZ: z-d/2, maxZ: z+d/2 });
}
function addFloor(x, z, w, d, mat, hasCeiling = true) {
    const f = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d), mat);
    f.position.set(x, -0.1, z); f.receiveShadow = true; scene.add(f);
    if (hasCeiling) {
        const c = new THREE.Mesh(new THREE.BoxGeometry(w, 0.2, d), matWall);
        c.position.set(x, 5.1, z); scene.add(c);
    }
}

// --- MAP GENERATION (Includes new "Warehouse" section) ---
addFloor(0, 4, 10, 10, matFloor); addWall(0, -1.5, 10, 1); addWall(-5.5, 4, 1, 12); addWall(5.5, 4, 1, 12); 
addWall(-3.5, 9.5, 5, 1); addWall(3.5, 9.5, 5, 1); addFloor(0, 15, 4, 10, matFloor); 
addWall(-2.5, 15, 1, 10); addWall(2.5, 15, 1, 10); addFloor(0, 25, 12, 10, matFloor); 
addWall(-4.5, 19.5, 5, 1); addWall(4.5, 19.5, 5, 1); addWall(-6.5, 25, 1, 12); addWall(6.5, 25, 1, 12); 
addWall(-4, 30.5, 6, 1); addWall(4, 30.5, 6, 1); addFloor(0, 41, 20, 20, matDirt, false); 
addWall(-10.5, 41, 1, 22); addWall(10.5, 41, 1, 22); addWall(0, 51.5, 22, 1); 

// New Warehouse Section (Huge open area attached to the side)
addFloor(25, 25, 30, 30, matFloor, true);
addWall(10.5, 25, 1, 8); // Doorway connector wall
addWall(40.5, 25, 1, 30); // Far right wall
addWall(25, 9.5, 30, 1);  // Warehouse bottom wall
addWall(25, 40.5, 30, 1); // Warehouse top wall
// Add pillars in warehouse
for(let px = 15; px <= 35; px += 10) {
    for(let pz = 15; pz <= 35; pz += 10) { addWall(px, pz, 1.5, 1.5); }
}

spawnPoints.push(
    new THREE.Vector3(0, 0, 16), new THREE.Vector3(0, 0, 40), 
    new THREE.Vector3(20, 0, 20), new THREE.Vector3(30, 0, 30), new THREE.Vector3(35, 0, 15)
);

// Interactables (Barrier)
const barrierMesh = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 0.5), matBarrier);
barrierMesh.position.set(0, 2, 30.5); scene.add(barrierMesh);
const barrierCol = { minX: -2, maxX: 2, minZ: 30.25, maxZ: 30.75 };
colliders.push(barrierCol);
interactables.push({
    x: 0, z: 30.5, radius: 3, type: 'barrier', cost: 750, active: true, text: "[E] OPEN DOOR - 750",
    execute: (item) => {
        scene.remove(barrierMesh); colliders.splice(colliders.indexOf(barrierCol), 1);
        item.active = false; playChime();
    }
});

// Interactables (Wallbuy - Assault Rifle)
const wallbuyMesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 0.1), makeSmoothColor(0x888888));
wallbuyMesh.position.set(5.4, 2.5, 25); wallbuyMesh.rotation.y = -Math.PI/2; scene.add(wallbuyMesh);
let ownsAR = false;
interactables.push({
    x: 5.4, z: 25, radius: 3, type: 'wallbuy', cost: 1200, active: true, text: "[E] BUY ASSAULT RIFLE - 1200",
    execute: (item) => {
        ownsAR = true; item.text = "[E] REFILL AR AMMO - 600"; item.cost = 600;
        switchWeapon(2); weapons[2].res = 120; updateAmmoUI(); playChime();
    }
});

scene.add(new THREE.AmbientLight(0x333333));
function addLight(color, int, dist, x, y, z) {
    const pl = new THREE.PointLight(color, int, dist); pl.position.set(x,y,z);
    pl.castShadow = true; scene.add(pl);
}
addLight(0xffa555, 1.5, 15, 0, 4, 4); addLight(0xffa555, 1.5, 20, 0, 4, 25);
addLight(0x88aaff, 1.5, 25, 0, 4, 45); addLight(0xffddaa, 1.8, 30, 25, 4, 25); // Warehouse light

// --- PLAYER & VIEWMODELS ---
const viewmodel = new THREE.Group();
const vmShotgun = new THREE.Group(); const vmAR = new THREE.Group(); const vmHands = new THREE.Group();

// Shotgun
const sgBarrel = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 1.0), matGunMetal);
sgBarrel.position.set(0.25, -0.22, -0.6); vmShotgun.add(sgBarrel);
const sgPump = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.35), matGunWood);
sgPump.position.set(0.25, -0.26, -0.5); vmShotgun.add(sgPump);

// Assault Rifle
const arBarrel = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.08, 0.9), matGunMetal);
arBarrel.position.set(0.2, -0.2, -0.5); vmAR.add(arBarrel);
const arMag = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.2, 0.1), matGunMetal);
arMag.position.set(0.2, -0.35, -0.3); arMag.rotation.x = 0.2; vmAR.add(arMag);

const muzzleLight = new THREE.PointLight(0xffaa33, 0, 6);
muzzleLight.position.set(0.25, -0.22, -1.1); viewmodel.add(muzzleLight);
viewmodel.add(vmShotgun); viewmodel.add(vmAR); viewmodel.add(vmHands);
camera.add(viewmodel); scene.add(camera);

// Visible Player Body (No longer hidden)
const playerBody = new THREE.Group(); scene.add(playerBody);
const pTorso = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.62, 0.28), matPlayerCloth); pTorso.position.set(0, 1.0, 0); playerBody.add(pTorso);
const pLegL = new THREE.Mesh(new THREE.BoxGeometry(0.19, 0.9, 0.22), matPlayerCloth); pLegL.position.set(-0.13, 0.45, 0); playerBody.add(pLegL);
const pLegR = new THREE.Mesh(new THREE.BoxGeometry(0.19, 0.9, 0.22), matPlayerCloth); pLegR.position.set(0.13, 0.45, 0); playerBody.add(pLegR);
const pArmL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.6, 0.15), matPlayerCloth); pArmL.position.set(-0.35, 1.0, 0); playerBody.add(pArmL);
const pArmR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.6, 0.15), matPlayerCloth); pArmR.position.set(0.35, 1.0, 0); playerBody.add(pArmR);

// --- ZOMBIE SYSTEM (Infinite Scaling & Variants) ---
const zombies = []; let targets = [];
function spawnZombie(x, z, wave) {
    const zGroup = new THREE.Group(); zGroup.position.set(x, 0, z);
    const zMat = makeSmoothColor(0x4a5c48); // Sickly green/grey HD color
    
    // Variant Logic
    let type = 'normal'; let scale = 1.0; let hpBase = 100; let spdBase = 2.0;
    if (wave > 3) {
        const roll = Math.random();
        if (roll > 0.85) { type = 'tank'; scale = 1.4; hpBase = 400; spdBase = 1.0; zMat.color.setHex(0x332222); }
        else if (roll > 0.6) { type = 'runner'; scale = 0.9; hpBase = 60; spdBase = 4.2; zMat.color.setHex(0x552222); }
    }

    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.4*scale, 0.7*scale, 0.3*scale), zMat); torso.position.y = 1.0*scale; zGroup.add(torso);
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.25*scale, 0.25*scale, 0.25*scale), zMat); head.position.y = 1.5*scale; zGroup.add(head);
    const aL = new THREE.Mesh(new THREE.BoxGeometry(0.15*scale, 0.5*scale, 0.15*scale), zMat); aL.position.set(-0.3*scale, 1.0*scale, 0); zGroup.add(aL);
    const aR = new THREE.Mesh(new THREE.BoxGeometry(0.15*scale, 0.5*scale, 0.15*scale), zMat); aR.position.set(0.3*scale, 1.0*scale, 0); zGroup.add(aR);
    
    scene.add(zGroup);
    
    // Infinite HP Scaling: +10% health per round
    const finalHp = hpBase * Math.pow(1.1, wave - 1);

    const data = { 
        mesh: zGroup, parts: [torso, head, aL, aR], hp: finalHp, 
        isDead: false, speed: spdBase + (wave * 0.05), animTime: Math.random()*10, dmg: 10 + wave 
    };
    zombies.push(data);
    data.parts.forEach(p => { p.userData.zData = data; targets.push(p); });
}

let currentRound = 1; let zombiesAlive = 0;
function startWave() {
    document.getElementById('roundNumber').innerText = currentRound;
    const notice = document.getElementById('waveNotice');
    document.getElementById('waveNoticeNum').innerText = currentRound;
    notice.style.opacity = 1; setTimeout(() => notice.style.opacity = 0, 3000);
    
    // Infinite Spawn Scaling
    const toSpawn = Math.floor(4 + (currentRound * 2.5));
    zombiesAlive = toSpawn;
    for (let i=0; i<toSpawn; i++) {
        const pt = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
        setTimeout(() => spawnZombie(pt.x + (Math.random()-0.5)*2, pt.z + (Math.random()-0.5)*2, currentRound), i * 800);
    }
}

// --- PLAYER MECHANICS ---
let playerHP = 100; const MAX_HP = 100; let lastHitTime = 0; let pts = 500;
function updateUI() {
    document.getElementById('hpFill').style.width = Math.max(0, playerHP) + '%';
    document.getElementById('points').innerText = pts;
}
function damagePlayer(amount) {
    if (currentGameState !== STATES.PLAYING) return;
    playerHP -= amount; lastHitTime = performance.now(); updateUI(); playDamage();
    const vig = document.getElementById('dmgVignette'); vig.style.opacity = 1;
    setTimeout(() => vig.style.opacity = 0, 200);
    if (playerHP <= 0) {
        currentGameState = STATES.DEAD; document.exitPointerLock();
        document.getElementById('hud').style.display = 'none';
        document.getElementById('gameOverStats').innerText = `Survived to Round ${currentRound} | Score: ${pts}`;
        document.getElementById('gameOverMenu').style.display = 'flex';
    }
}

// Weapon System Array
const weapons = [
    { id: 0, name: 'Hands', cur: 0, res: 0, max: 0, dmg: 50, rate: 500, type: 'melee' },
    { id: 1, name: 'Shotgun', cur: 8, res: 32, max: 8, dmg: 25, pellets: 8, rate: 800, type: 'spread' },
    { id: 2, name: 'Assault Rifle', cur: 30, res: 120, max: 30, dmg: 40, pellets: 1, rate: 120, type: 'auto' }
];
let equipped = 1; let isReloading = false; let lastFireTime = 0;

function switchWeapon(id) {
    if (isReloading || (id === 2 && !ownsAR)) return;
    equipped = id;
    vmHands.visible = (id === 0); vmShotgun.visible = (id === 1); vmAR.visible = (id === 2);
    document.getElementById('ammo').style.display = id === 0 ? 'none' : 'block';
    document.getElementById('crosshair').style.display = id === 0 ? 'none' : 'block';
    updateAmmoUI();
}
function updateAmmoUI() {
    document.getElementById('ammoCurrent').innerText = weapons[equipped].cur;
    document.getElementById('ammoReserve').innerText = weapons[equipped].res;
}

function fireWeapon() {
    const w = weapons[equipped]; const now = performance.now();
    if (isReloading || now - lastFireTime < w.rate) return;
    if (w.cur <= 0 && w.type !== 'melee') { initiateReload(); return; }
    
    lastFireTime = now;
    if (w.type !== 'melee') {
        w.cur--; updateAmmoUI(); playShot(w.id === 1);
        muzzleLight.intensity = 5; setTimeout(() => muzzleLight.intensity = 0, 50);
        viewmodel.position.z += 0.15; setTimeout(() => viewmodel.position.z -= 0.15, 100);
        pitch += 0.02; // Recoil
    } else {
        playDamage(); // Melee sound
    }

    const raycaster = new THREE.Raycaster();
    const hitTotals = new Map();
    
    let shots = w.type === 'spread' ? w.pellets : 1;
    for (let i = 0; i < shots; i++) {
        let spread = w.type === 'spread' ? 0.03 : (w.type === 'auto' ? 0.01 : 0);
        raycaster.setFromCamera({ x: (Math.random()-0.5)*spread, y: (Math.random()-0.5)*spread }, camera);
        const hits = raycaster.intersectObjects(targets);
        if (hits.length > 0 && hits[0].distance < (w.type === 'melee' ? 2.5 : 50)) {
            const zData = hits[0].object.userData.zData;
            if (zData && !zData.isDead) {
                hitTotals.set(zData, (hitTotals.get(zData) || 0) + w.dmg);
            }
        }
    }

    hitTotals.forEach((dmg, zData) => {
        zData.hp -= dmg; pts += 10; updateUI();
        const hm = document.getElementById('hitmarker');
        hm.style.opacity = 1; setTimeout(() => hm.style.opacity = 0, 100);
        
        if (zData.hp <= 0) {
            zData.isDead = true; pts += 50; updateUI(); hm.style.color = '#ffcc00';
            zData.parts.forEach(p => p.material.color.setHex(0x330000));
            zombiesAlive--;
            if (zombiesAlive <= 0) { currentRound++; setTimeout(startWave, 3000); }
        }
    });
}

function initiateReload() {
    const w = weapons[equipped];
    if (isReloading || w.cur === w.max || w.res === 0 || w.type === 'melee') return;
    isReloading = true; viewmodel.position.y -= 0.3;
    setTimeout(() => {
        const need = w.max - w.cur; const pull = Math.min(need, w.res);
        w.cur += pull; w.res -= pull; updateAmmoUI();
        viewmodel.position.y += 0.3; isReloading = false;
    }, 1500);
}

// --- CONTROLS & LOOP ---
let yaw = 0, pitch = 0; const keys = {}; let isGrounded = true; let velY = 0;
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (e.code === 'Escape') currentGameState === STATES.PLAYING ? (document.exitPointerLock(), document.getElementById('pauseMenu').style.display='flex', currentGameState=STATES.PAUSED) : null;
    if (currentGameState === STATES.PLAYING) {
        if (e.code === 'Digit1') switchWeapon(0); if (e.code === 'Digit2') switchWeapon(1); if (e.code === 'Digit3') switchWeapon(2);
        if (e.code === 'KeyR') initiateReload();
        if (e.code === 'Space' && isGrounded) { velY = 7; isGrounded = false; }
        if (e.code === 'KeyE') {
            const activeInteractable = interactables.find(i => i.active && Math.hypot(camera.position.x - i.x, camera.position.z - i.z) < i.radius);
            if (activeInteractable && pts >= activeInteractable.cost) {
                pts -= activeInteractable.cost; updateUI(); activeInteractable.execute(activeInteractable);
            }
        }
    }
});
document.addEventListener('mousemove', e => {
    if (currentGameState !== STATES.PLAYING) return;
    yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
});
document.addEventListener('mousedown', e => {
    if (currentGameState === STATES.PLAYING && e.button === 0) fireWeapon();
});

document.getElementById('startBtn').onclick = () => {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    currentGameState = STATES.PLAYING; switchWeapon(1); startWave();
    document.body.requestPointerLock();
};
document.getElementById('resumeBtn').onclick = () => {
    document.getElementById('pauseMenu').style.display = 'none';
    currentGameState = STATES.PLAYING; document.body.requestPointerLock();
};
document.getElementById('resSelect').onchange = e => { RES_SCALE = parseFloat(e.target.value); resize(); };
document.getElementById('settingsBtn').onclick = () => { document.getElementById('mainMenu').style.display = 'none'; document.getElementById('settingsMenu').style.display = 'flex'; };
document.getElementById('settingsBackBtn').onclick = () => { document.getElementById('settingsMenu').style.display = 'none'; document.getElementById('mainMenu').style.display = 'flex'; };

const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate); const dt = Math.min(clock.getDelta(), 0.1);
    if (currentGameState === STATES.PLAYING) {
        
        // Auto-fire logic
        if (keys['Mouse0'] || (keys['Space'] && weapons[equipped].type === 'auto')) { /* Auto fire handled by mousedown usually, but we need loop for holding */ }

        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw)); const rgt = new THREE.Vector3(-fwd.z, 0, fwd.x);
        let mx = 0, mz = 0; const spd = (keys['ShiftLeft'] ? 9.0 : 5.0) * dt;
        if (keys['KeyW']) { mx+=fwd.x; mz+=fwd.z; } if (keys['KeyS']) { mx-=fwd.x; mz-=fwd.z; }
        if (keys['KeyD']) { mx+=rgt.x; mz+=rgt.z; } if (keys['KeyA']) { mx-=rgt.x; mz-=rgt.z; }
        
        let nx = camera.position.x + mx; let nz = camera.position.z + mz;
        if (!colliders.some(c => nx+0.3 > c.minX && nx-0.3 < c.maxX && camera.position.z+0.3 > c.minZ && camera.position.z-0.3 < c.maxZ)) camera.position.x = nx;
        if (!colliders.some(c => camera.position.x+0.3 > c.minX && camera.position.x-0.3 < c.maxX && nz+0.3 > c.minZ && nz-0.3 < c.maxZ)) camera.position.z = nz;

        if (!isGrounded) {
            velY -= 18 * dt; camera.position.y += velY * dt;
            if (camera.position.y <= 1.6) { camera.position.y = 1.6; velY = 0; isGrounded = true; }
        }

        // Keep Player Body Under Camera (Visible when looking down)
        playerBody.position.set(camera.position.x, camera.position.y - 1.5, camera.position.z);
        playerBody.rotation.y = yaw;

        // Interaction Prompt
        const activeInt = interactables.find(i => i.active && Math.hypot(camera.position.x - i.x, camera.position.z - i.z) < i.radius);
        const prompt = document.getElementById('promptText');
        if (activeInt) { prompt.innerText = activeInt.text; prompt.style.opacity = pts >= activeInt.cost ? 1 : 0.5; } 
        else { prompt.style.opacity = 0; }

        // Zombie Logic
        for (let i = zombies.length - 1; i >= 0; i--) {
            const z = zombies[i];
            if (z.isDead) {
                z.mesh.position.y -= dt;
                if (z.mesh.position.y < -2) { scene.remove(z.mesh); zombies.splice(i, 1); }
                continue;
            }
            const dist = Math.hypot(camera.position.x - z.mesh.position.x, camera.position.z - z.mesh.position.z);
            z.mesh.lookAt(camera.position.x, 0, camera.position.z);
            if (dist > 1.5) {
                const sx = ((camera.position.x - z.mesh.position.x)/dist) * z.speed * dt;
                const sz = ((camera.position.z - z.mesh.position.z)/dist) * z.speed * dt;
                if (!colliders.some(c => z.mesh.position.x+sx > c.minX && z.mesh.position.x+sx < c.maxX && z.mesh.position.z > c.minZ && z.mesh.position.z < c.maxZ)) z.mesh.position.x += sx;
                if (!colliders.some(c => z.mesh.position.x > c.minX && z.mesh.position.x < c.maxX && z.mesh.position.z+sz > c.minZ && z.mesh.position.z+sz < c.maxZ)) z.mesh.position.z += sz;
                
                // Walking animation
                z.animTime += dt * 8;
                z.parts[2].rotation.x = Math.sin(z.animTime) * 0.5; // Left Arm
                z.parts[3].rotation.x = Math.sin(z.animTime + Math.PI) * 0.5; // Right Arm
            } else {
                // Attack Player
                if (!z.atkCd) z.atkCd = 0;
                z.atkCd -= dt;
                if (z.atkCd <= 0) { damagePlayer(z.dmg); z.atkCd = 1.0; }
                z.parts[2].rotation.x = -Math.PI/2 + Math.sin(performance.now()*0.01)*0.5;
                z.parts[3].rotation.x = -Math.PI/2 + Math.sin(performance.now()*0.01)*0.5;
            }
        }
    }
    renderer.render(scene, camera);
}
animate();

// Handle auto fire tracking
let autoFireInterval;
document.addEventListener('mousedown', e => {
    if (currentGameState === STATES.PLAYING && weapons[equipped].type === 'auto') {
        autoFireInterval = setInterval(fireWeapon, weapons[equipped].rate);
    }
});
document.addEventListener('mouseup', () => clearInterval(autoFireInterval));
</script>
</body>
</html>
